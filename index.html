 {id:'uzungol',c:'nat',pr:'mid',lat:40.6194407,lng:40.2960778,r:'4.4',rc:'17.7 ألف',gf:'careful',k:'nature',ar:{n:'أوزنجول (رحلة يوم)',d:'بحيرة جبلية جميلة، ~٩٥–٩٩كم/١.٥س. دخول حديقة الطبيعة ~٦٠₺/شخص، تراس المراقبة العلوي مجاني، موقف ~٢٠–٣٠₺. ⚠️⚠️ صارت تجارية وفخّ سياحي — محلات ومطاعم غالية جداً؛ لو رحتوا: وصول صباح باكر (قبل الزحام) أو بعد الظهر للموقف، وكُلوا قبل/بعد مش بمطاعم البحيرة. الممشى حول البحيرة سهل للأطفال وكبار السن.'},tr:{n:'Uzungöl',d:'Dağ gölü. Tabiat parkı ~60₺, seyir terası ücretsiz. Turistik/pahalı.'}},
 {id:'botanikbahce',c:'view',pr:'mid',lat:40.986142,lng:39.7088401,r:'4.5',rc:'6745',k:'nature',ar:{n:'الحديقة النباتية (Botanik Bahçesi)',d:'🌷 جوهرة هادئة على تلّة بإطلالة على البحر الأسود والجبال (4.5★، 6745 تقييم). أزهار وممرات وجسور خشبية، وفيها أرانب وغزلان للأطفال 🐰🦌، وكافيه وسط الحديقة بفطور ممتاز وسعر عادل. باركنغ مجاني، وأهدى بأيام الأسبوع. ~٤كم غرب المركز (تكسي قصير). مناسبة جداً للعائلة.'},tr:{n:'Trabzon Botanik Bahçesi',d:'Deniz manzaralı sakin bahçe (4.5★). Tavşan & geyik, güzel kahvaltı. Ücretsiz otopark.'}},
 {id:'meydanpark',c:'walk',pr:'kadih',lat:41.0053718,lng:39.7308778,r:'4.4',rc:'33.6 ألف',k:'nature',ar:{n:'حديقة الميدان (وسط البلد)',d:'🌳 قلب طرابزون النابض على بُعد دقائق مشي من الفندق (4.4★) — مساحة خضراء محاطة بالمقاهي والمطاعم والمحلات. أجواء أوروبية، تقعد بالحديقة أو على كافيه بطرفها وتتفرّج عالناس. بالصيف فيه عروض رقص فولكلوري تركي شبه يومية. ألطف مكان لتمشية المسا القريبة.'},tr:{n:'Meydan Parkı',d:'Şehrin kalbi, otele yürüme mesafesi (4.4★). Kafeler, restoranlar, yazın halk oyunları.'}},
 {id:'farozliman',c:'walk',pr:'kadih',lat:41.0085726,lng:39.704002,r:'4.5',rc:'365',k:'nature',ar:{n:'ميناء فاروز للصيد (غروب)',d:'🌅 ملجأ صيد ملوّن وهادئ على الساحل (4.5★) — بيوت صيادين ملوّنة، نوارس، وأجمل غروب بطرابزون. تقدر تجيب أكلك معك وتقعد عالبحر (بيبيعوا مشروبات بس). جوّ شاعري وقت الشروق أو الغروب. ~٣كم غرب المركز على طريق الساحل.'},tr:{n:'Faroz Balıkçı Barınağı',d:'Renkli balıkçı barınağı, en güzel gün batımı (4.5★). Yemeğini getirebilirsin.'}},
 {id:'limni',c:'nat',pr:'mid',lat:40.609395,lng:39.4129477,r:'4.1',rc:'2261',k:'nature',ar:{n:'بحيرة لمني (منتزه طبيعي)',d:'🏞️ بحيرة صغيرة فوق الجبل وسط الصنوبر مع شلّال وبحر غيوم (4.1★). فيها مطعم وكافيه وحمّامات وباركنغ ومسجد وألعاب أطفال وطاولات بيكنيك. على طريق هامسي‌كوي/زيغانا (~٨٥كم/١.٥س جنوباً). ⚠️ الطريق ضيّق وبلا إنارة ليلاً — روحوا نهاراً وارجعوا قبل العتمة، وانتبهوا بالضباب.'},tr:{n:'Limni Gölü Tabiat Parkı',d:'Dağda göl + şelale + bulut denizi (4.1★). ~1.5s. ⚠️ Yol dar, geceleri gitmeyin.'}},
 {id:'calcamili',c:'nat',pr:'kadih',lat:40.8691775,lng:39.3807326,r:'4.5',rc:'322',k:'nature',ar:{n:'منتزه چالكاميلي الطبيعي',d:'🌲 غابة خضراء غنية بالأكسجين قرب كهف چال (4.5★) — مكان رائق للبيكنيك والاسترخاء مع العائلة. دوزكوي (~٥٠كم/١س جنوب-غرب). ⚠️ الحمّامات قديمة وتحتاج صيانة. اجمعوها مع كهف چال بنفس اليوم.'},tr:{n:'Çalcamili Tabiat Parkı',d:'Çal Mağarası yanı yeşil orman (4.5★), piknik. ⚠️ Tuvaletler eski.'}},
 {id:'kadirga',c:'nat',pr:'kadih',lat:40.722162,lng:39.3311481,r:'4.7',rc:'357',k:'nature',ar:{n:'يايلا كادِرغا + الجامع المكشوف',d:'⛰️ هضبة على ارتفاع ~٢٤٠٠م بهواء نقي ومناظر خرافية (4.7★) — وفيها جامع تاريخي مكشوف (بلا جدران ولا سقف) تصلّي تحت السما. الطرق معبّدة. ⚠️ بعيدة (~٢س ونص) وبرد حتى بالصيف — خذوا جواكيت. رحلة مغامرة للي بدّه طبيعة عالية.'},tr:{n:'Kadırga Yaylası',d:'~2400m yayla, açık hava tarihi cami (4.7★). ⚠️ ~2.5s uzak, soğuk, ceket alın.'}},
 {id:'hamsikoy',c:'nat',pr:'kadih',lat:40.6850076,lng:39.4810557,r:'4.4',rc:'523',k:'nature',ar:{n:'قرية هامسي‌كوي (الأرزّ بالحليب)',d:'🏘️ قرية جبلية ساحرة على طريق سوميلا/زيغانا (~٥٠كم/١س) — مشهورة بأشهى «سُتلاتش» (أرز بالحليب) بتركيا، وكوفتة وأجواء خضراء باردة. محطة مثالية بالطريق للجبال. ابحثوا عن مطعم پروانوغلو للأصلي.'},tr:{n:'Hamsiköy',d:'Sümela yolu sevimli dağ köyü (4.4★). Meşhur sütlaç & köfte. Mola için ideal.'}},
 {id:'cosandere',c:'nat',pr:'kadih',lat:40.7636706,lng:39.6068654,r:'4.1',rc:'14',k:'nature',ar:{n:'وادي چوشان‌دره (طريق سوميلا)',d:'🌊 وادي أخضر على صوت النهر، مباني خشبية ومحلات تذكارات، على طريق سوميلا (الكيلو ٥). محطة راحة لطيفة بالطبيعة قبل/بعد سوميلا. هادئ ومنعش. (تقييمات قليلة بس المكان جميل).'},tr:{n:'Coşandere Vadisi',d:'Sümela yolu yeşil dere vadisi. Dinlenme molası için güzel.'}},
 {id:'meryemana',c:'nat',pr:'kadih',lat:40.701959,lng:39.6517061,r:'4.4',rc:'554',k:'nature',ar:{n:'وادي مريم العذرا (ألتِن‌دره)',d:'🏞️ الوادي الأخضر الخلّاب تحت دير سوميلا داخل منتزه ألتِن‌دره الوطني (4.4★) — جسور حجرية قديمة ومشي بين الأشجار وصوت الماء. ⚠️ المشي صعود ~٧كم وممكن يزلق بالمطر. اجمعوه مع زيارة سوميلا.'},tr:{n:'Meryemana Vadisi (Altındere)',d:'Sümela altı yeşil vadi, taş köprüler (4.4★). ⚠️ Yürüyüş yokuş, yağmurda kaygan.'}},
 {id:'caglayan',c:'nat',pr:'kadih',lat:40.9266527,lng:40.4638362,r:'4.4',rc:'281',k:'nature',ar:{n:'شلّال چاغلايان (ريزه)',d:'💦 شلّال جميل وسط وادٍ أخضر بين أوف وريزه (4.4★) — باركنغ قريب ثم مشي ~١٠د. ⚠️ بعيد (بمحافظة ريزه) والطريق ضيّق وخطر شوي، والقرية مش مهيّأة للسياحة. للمغامرين فقط — والمنظر يستاهل.'},tr:{n:'Çağlayan Şelalesi (Rize)',d:'Yeşil vadide şelale (4.4★). ⚠️ Uzak, yol dar, turistik değil.'}},
 {id:'zigana',c:'view',pr:'kadih',lat:40.6453,lng:39.4065,r:'4.5',rc:'1200',k:'nature',ar:{n:'جبل ومعبر زيغانا',d:'🏔️ معبر جبلي شهير على ارتفاع عالٍ (~٢٠٣٠م) بين طرابزون وغوميشهانه — مناظر خضراء وبحر غيوم صيفاً ومنتجع تزلّج شتاءً، وأطول نفق بتركيا (نفق زيغانا) بالطريق. ~٦٥كم/١س جنوباً، وبالطريق لبحيرة لمني وهامسي‌كوي. ⚠️ الطريق جبلي ملتوٍ.'},tr:{n:'Zigana Geçidi',d:'~2030m dağ geçidi, bulut denizi & kayak (4.5★). Limni & Hamsiköy yolu üzerinde.'}},
 {id:'sumela',c:'view',pr:'mid',lat:40.6901226,lng:39.6583949,r:'4.2',gf:'na',ar:{n:'دير سوميلا (رحلة يوم)',d:'دير بيزنطي معلّق بالجبل، ~٤٥–٥٠كم/١س جنوباً. دخول أجانب ~€٢٠، يفتح يومياً ٨ص–٧م (آخر تذكرة ٦:٣٠م). <b>الوصول بالسيارة ممنوع</b> — موقف أسفل الوادي (~١٢٠₺) ثم شاتل إلزامي (~٥٠–١٤٠₺/شخص) + مسار غابة ٣٥٠م ودرج. ⚠️ درج شاقّ، غير مناسب لكبار السن جداً/العربات؛ ممكن لابن الـ٦ و١١. روحوا الصبح (٨ص) لتفادي الزحام والحر. لبس محتشم. احملوا نقد. 🎫 تذكرة إلكترونية رسمية: muze.gov.tr · ☎️ 0462 531 10 64. (تحقّقنا ٧/٢٠٢٦ من الموقع الرسمي.)'},tr:{n:'Sümela Manastırı',d:'Kayaya asılı manastır. 08:00–19:00, ~20€. Ring servisi zorunlu.'}},

 {id:'cephanelik',c:'view',pr:'dah',lat:40.9985,lng:39.7325,r:'4.2',gf:'careful',ar:{n:'Cephanelik Cafe & Restaurant 💎',d:'بانوراما راقية من بوزتبه قرب الفندق (~١.٥كم). حلو للغروب.'},tr:{n:'Cephanelik 💎',d:'Boztepe panorama.'}},

 {id:'leefor',c:'coffee',pr:'dah',lat:40.9837922,lng:39.7695538,r:'4.9',rc:'231',gf:'careful',ar:{n:'Leefor Cafe & Patisserie 💎',d:'⭐ أحلى فطور بطرابزون حسب الزوّار (4.9★) — مكان أنيق ونظيف بإطلالة، تنوّع وطعم ممتاز وأرخص من غيره. (المخبوزات قمح).'},tr:{n:'Leefor 💎',d:'En iyi kahvaltı (4.9★).'}},
 {id:'cemilusta',c:'food',pr:'mid',lat:41.0046,lng:39.7278,r:'4.5',gf:'careful',ar:{n:'Cemil Usta (كفتة أكاتشأباط)',d:'إرث +٧٠ سنة: كفتة أكاتشأباط ومشاوي وبقلاوة، ~٥د من الفندق، حلال بلا كحول، بيفتح ~٢٤ ساعة. حجز: ☎️ 0462 228 91 04. (البقلاوة/الكفتة قمح — للجلوتين مشاوي بس).'},tr:{n:'Cemil Usta',d:'Akçaabat köfte + baklava. Rez: 0462 228 91 04.'}},
 {id:'faroz',c:'food',pr:'kadih',lat:41.0012,lng:39.7065,r:'4.2',gf:'careful',ar:{n:'فاروز (Faroz) — سمك الصيّادين',d:'منطقة صيّادين محلية، سمك طازج أرخص. للجلوتين: مشوي بس.'},tr:{n:'Faroz balıkçılar',d:'Yerel taze balık.'}},
 {id:'akcaabat',c:'food',pr:'mid',lat:41.0206,lng:39.5697,r:'4.4',gf:'careful',k:'nature',ar:{n:'كفتة أكاتشأباط (Akçaabat)',d:'وين الأهالي بياكلوا الكفتة الشهيرة (~٢٠د غرباً). ⚠️ الكفتة عادةً فيها خبز — للجلوتين اسألوا أو بديل مشوي.'},tr:{n:'Akçaabat köftesi',d:'Yerel köfte. ⚠️ Ekmekli.'}},
 {id:'hidirnebi',c:'nat',pr:'mid',lat:40.9548761,lng:39.4318335,r:'4.5',rc:'10.9 ألف',gf:'na',k:'nature',ar:{n:'يايلا هيدرنبي (Hıdırnebi)',d:'هضبة ١٦٠٠م يقصدها الأهالي صيفاً — هوا بارد وضباب وبحر غيوم. ~١س (أكاتشأباط-دوزكوي). مهرجان ~١٣–٢٠ تموز. خذوا جاكيت.'},tr:{n:'Hıdırnebi Yaylası',d:'1600m. ~1 sa. Ceket al.'}},
 {id:'sisdagi',c:'nat',pr:'mid',lat:40.6519,lng:40.0431,r:'4.4',gf:'na',k:'nature',ar:{n:'يايلا سيس داغي (Sis Dağı)',d:'هضبة الضباب — مراعي وغيوم، مهرجان ثالث سبت من تموز. أبعد شوي بس ساحرة.'},tr:{n:'Sis Dağı Yaylası',d:'Sis festivali.'}},
 {id:'calcave',c:'nat',pr:'mid',lat:40.8651962,lng:39.3795313,r:'4.4',rc:'10.5 ألف',gf:'na',k:'play',ar:{n:'كهف چال (Çal Mağarası)',d:'من أطول كهوف العالم — ممشى وشلال داخلي وبرودة لطيفة. ~٤٥د–١س (دوزكوي). مغامرة يحبّها الأطفال.'},tr:{n:'Çal Mağarası',d:'Mağara + şelale.'}},
 {id:'teleferik',c:'kids',pr:'mid',lat:41.0510,lng:39.2360,r:'4.2',rc:'تلفريك',gf:'na',k:'play',ar:{n:'تلفريك بشيكداغ (Beşikdüzü)',d:'🚡 أطول تلفريك بالبحر الأسود (٣٠١٠م) يرفعك لقمة ٥٣١م — كابينتين ذهاب/إياب. ~٤٥د غرباً (بشيكدوزو). يومياً ١٠:٣٠–١٧:٣٠. للمواطنين ~٨٠₺، للأجانب بالدولار (~١٢$). موقف عند المحطة السفلى. ⚠️ التلفريك <b>داخل مدينة طرابزون غير موجود</b> (مشروع مستقبلي) — هاد أقرب واحد عامل.'},tr:{n:'Beşikdağ Teleferik',d:'Karadeniz\'in en uzun teleferiği (3010m). 10:30–17:30. Şehir içi teleferik henüz yok.'}},
 {id:'akvaryum',c:'kids',pr:'mid',lat:41.0042,lng:39.7172,r:'4.3',rc:'أكواريوم النفق',gf:'na',k:'play',ar:{n:'أكواريوم النفق (Tünel Akvaryum)',d:'🐠 أول أكواريوم بالعالم مبني جوّا نفق (4.3★) — ممر مشي ٣٠٠م و٦١ حوض و+٥٠٠٠ كائن بحري. عرض إطعام القروش ثلاثاء/خميس/سبت/أحد ٣:٣٠–٣:٤٥م. يومياً ١٠ص–٦م (أطول صيفاً). داخلي مكيّف — مثالي وقت الحر. وسط البلد بوادي زاغنوس.'},tr:{n:'Tünel Akvaryum',d:'Dünyanın ilk tünel akvaryumu, köpek balığı besleme gösterisi.'}},
 {id:'fevzihoca',c:'food',pr:'mid',lat:41.0671981,lng:39.5173228,r:'4.3',rc:'1.3 ألف',gf:'careful',ar:{n:'Fevzi Hoca Balık Köfte',d:'سمك وكفتة بإطلالة بحر خلابة + فطور بوفيه (أكاتشأباط ~٢٥د غرباً). خدمة ودودة ومدح كبير للمنظر. ⚠️ مراجعات متفاوتة (أحياناً كميات صغيرة). للجلوتين: سمك مشوي بس.'},tr:{n:'Fevzi Hoca Balık Köfte',d:'Deniz manzaralı (4.3★). Akçaabat.'}},

 {id:'cambo',c:'food',pr:'mid',lat:40.997438,lng:39.6783387,r:'4.4',rc:'731',gf:'no',ar:{n:'Cambo Künefe (حلويات)',d:'⭐ أحلى كنافة بطرابزون (4.4★ · ٧٣١) — كنافة بالآيس كريم والفستق، نظيف وفيه قسم بدون تدخين، مفتوح للساعة ٢ بالليل (~١٠د غرباً). ✕ كنافة = قمح، مش للسيلياك.'},tr:{n:'Cambo Künefe',d:'En iyi künefe (4.4★). Sigarasız bölüm var. ✕ glutensiz değil.'}},

 {id:'asimer',c:'food',pr:'dah',lat:40.9825958,lng:39.7668193,r:'4.4',rc:'1.1 ألف',gf:'careful',ar:{n:'Asimer — فطور تركي 💎',d:'فطور تركي تقليدي مثالي (4.4★) — كويماك ومحلمة «بإتقان مطلق»، أجواء بيتية دافئة. ابدؤوا واختموا رحلتكم فيه. (الخبز قمح).'},tr:{n:'Asimer Kahvaltı 💎',d:'Kuymak/muhlama (4.4★).'}},
 {id:'meselik',c:'food',pr:'dah',lat:40.9701881,lng:39.8112144,r:'4.4',rc:'552',gf:'careful',k:'nature',ar:{n:'Meşelik Bahçe — فطور ومنقل 💎',d:'فطور سربمة ومشاوي وسط الطبيعة (4.4★) — فطور طول اليوم وإطلالة خضراء وعائلي. قرب رمادا.'},tr:{n:'Meşelik Bahçe 💎',d:'Serpme kahvaltı, doğa (4.4★).'}},
 {id:'boztepeteras',c:'view',pr:'kadih',lat:40.9977633,lng:39.7293731,r:'4.5',rc:'1.1 ألف',gf:'na',k:'nature',ar:{n:'شرفة بوزتبه (Volkan Konak) 🏔️',d:'⭐ مطلّ بانورامي على طرابزون والبحر الأسود (4.5★) — ممرات خشبية وجسر زجاجي صغير ومقاهي وأمفي جلوس. سهل وقريب (~٥د)، وأحلى وقت <b>الغروب (~٧:٤٥م بيوليو)</b> ولأضواء المدينة. 💳 الدخول ~٦٠₺ (تحقّقنا ٣/٢٠٢٦) + التراس الزجاجي ~٢٠₺. 🆕 <b>صار في ممر يربط الشرفة بدير كيزلار مباشرة</b> (تذكرة الدير منفصلة ~٣٠–٦٠₺) — اجمعوهم بزيارة وحدة! ⚠️ بيهبّ هوا مساءً — خذوا جاكيت خفيف.'},tr:{n:'Boztepe Terası (Volkan Konak)',d:'Panorama. Giriş ~60₺ + cam teras 20₺. Kızlar Manastırı bağlantı yolu var.'}},
 {id:'besirlieco',c:'kids',pr:'kadih',lat:40.997155,lng:39.6749817,r:'4.3',rc:'1.6 ألف',gf:'na',k:'nature',ar:{n:'حديقة بشيرلي البيئية (أرانب وسلاحف) 🐰',d:'حديقة عائلية ممتعة للأطفال (4.3★) — أرانب وسلاحف وطيور (جيبوا أكل للأرانب)، ملعب وجسر و«طريق الفضاء» ومقهى ومصلّى ودورات نظيفة. مجاني.'},tr:{n:'Beşirli Eko Park 🐰',d:'Tavşan/kaplumbağa, çocuk dostu (4.3★).'}},
 {id:'cafejoy',c:'kids',pr:'mid',lat:40.9950,lng:39.8300,r:'4.3',rc:'مقهى ألعاب',gf:'na',k:'play',new:1,ar:{n:'Cafejoy Tostospark 🎈',d:'🎈 مقهى-مطعم مع <b>منطقة ألعاب وحوض كرات</b> للأطفال الصغار (Kaşüstü) — مثالي تقعد العيلة وتاكل بينما الصغار يلعبوا بأمان. حلال. جديد ورائج ٢٠٢٥.'},tr:{n:'Cafejoy Tostospark',d:'Oyun alanı + top havuzu, çocuk dostu kafe (2025).'}},
 {id:'cilekli',c:'kids',pr:'kadih',lat:41.0010,lng:39.7200,r:'4.5',rc:'مركز تعليمي',gf:'na',k:'learn',new:1,ar:{n:'قرية أحلام الفراولة 🍓',d:'🍓 مركز أطفال <b>تعليمي مجاني</b> (ورش علوم وتصميم وطبخ) مع مساحات خارجية — افتُتح ديسمبر ٢٠٢٥. ⚠️ بيشتغل غالباً بزيارات مدرسية منظّمة — <b>أكّدوا إمكانية الزيارة الفردية بالعطلة الصيفية</b> قبل ما تروحوا.'},tr:{n:'Çilekli Düşler Köyü',d:'Ücretsiz eğitim merkezi (2025). Bireysel ziyareti teyit edin.'}},
 {id:'pazarkapi',c:'walk',pr:'kadih',lat:41.0062,lng:39.7175,r:'4.4',rc:'منطقة حياة',gf:'na',k:'nature',new:1,ar:{n:'منطقة بازاركابي للحياة 🌊',d:'🌊 منطقة لقاء ساحلية جديدة (استثمار ٢٣٧ مليون₺) — تضم «سوق أوراسيا»، مركز العلوم، مقاهي وأكشاك، ومتّصلة بجامع هانِفة خاتون الجديد. تمشية عائلية حلوة على الساحل وسط البلد.'},tr:{n:'Pazarkapı Yaşam Alanı',d:'Yeni sahil buluşma alanı: Avrasya Pazarı, bilim merkezi, kafeler.'}},
 {id:'kusparki',c:'kids',pr:'kadih',lat:41.0020,lng:39.7150,r:'4.3',rc:'حديقة طيور',gf:'na',k:'play',ar:{n:'حديقة الطيور (Kuş Parkı) 🦜',d:'🦜 ملاصقة للأكواريوم — ٢٧ نوع طيور (طاووس، ببغاوات، بوم) بترخيص حديقة حيوان درجة أولى. تذكرة رخيصة منفصلة، بتندمج بزيارة وحدة مع الأكواريوم. بيع التذاكر ١٠ص–٧م.'},tr:{n:'Kuş Parkı',d:'27 kuş türü, akvaryumun yanında. Birlikte gezilebilir.'}},
 {id:'tilya',c:'kids',pr:'mid',lat:41.0180,lng:39.5720,r:'4.1',rc:'أكوا بارك',gf:'na',k:'play',ar:{n:'تيليا أكوا بارك (Tilya) 💦',d:'💦 المسبح المائي الرئيسي بالمنطقة — حوض أطفال + ٦ زحاليق للكبار، بإطلالة على البحر الأسود. داريجا/أكاتشأباط (~٣٠د غرباً). يومياً ١٠ص–٧م، دخول ~١٠€. مثالي وقت الحر. ⚠️ ممنوع إدخال أكل من برّا.'},tr:{n:'Tilya Aquapark',d:'Çocuk havuzu + 6 kaydırak, deniz manzarası. 10:00–19:00.'}},
 {id:'lunapark',c:'kids',pr:'kadih',lat:41.0035,lng:39.7250,r:'3.9',rc:'لونا بارك',gf:'na',k:'play',ar:{n:'لونا بارك (İpek Yolu Fuar) 🎡',d:'🎡 مدينة ملاهي بمنطقة المعارض قرب الساحل — ألعاب متنوّعة، دخول ~٥٠–١٥٠₺ حسب اللعبة. تفتح مساءً بالصيف. ⚠️ <b>تنبيه سلامة:</b> صار حادث بلعبة ٢٠٢٥ — التزموا بالألعاب المناسبة لعمر الأطفال وتأكّدوا من أحزمة الأمان.'},tr:{n:'Luna Park (İpek Yolu Fuar)',d:'Lunapark, akşamları açık. Güvenlik: yaşa uygun oyunlar.'}},
 {id:'playland',c:'kids',pr:'mid',lat:41.0050,lng:39.7015,r:'4.0',rc:'لعب داخلي',gf:'na',k:'play',ar:{n:'Playland / Wowland (مول Atapark)',d:'🎮 مركز لعب داخلي بمول أتاباركّ (Rubenis سابقاً Varlıbaş) — ألعاب وترامبولين للأطفال والشباب، بالتذكرة. مكيّف — بديل ممتاز وقت المطر أو الحر. ١٠ص–١٠م.'},tr:{n:'Playland / Wowland',d:'AVM içi kapalı oyun merkezi, trambolin. Sıcak/yağmurda ideal.'}},
 {id:'farozboat',c:'kids',pr:'mid',lat:41.0060,lng:39.7050,r:'4.4',rc:'جولة قارب',gf:'na',k:'play',ar:{n:'جولة قارب من ميناء فاروز ⛵',d:'⛵ تأجير قارب خاص من ميناء فاروز (حتى ~١٠ أشخاص/قارب — بدكم قاربين للـ١٩) لجولة بحرية على الساحل. متعة للأطفال والكبار، وأحلى وقت الغروب. وسط المدينة.'},tr:{n:'Faroz Limanı Tekne Turu',d:'Özel tekne turu (max ~10 kişi/tekne). Günbatımı harika.'}},
 {id:'sultanmurat',c:'nat',pr:'kadih',lat:40.6437129,lng:40.1509204,r:'4.5',rc:'8.6 ألف',gf:'na',k:'nature',ar:{n:'يايلا سلطان مراد ☁️',d:'هضبة فوق الغيوم بمناظر تحبس الأنفاس (4.5★ · ٨٬٦٤٠) — تلال خضراء وجامع جميل وبيوت خشبية. ⚠️ بعيد (~٢س جنوب شرق، تشايكارا)، جيبوا ملابس دافئة، اطلعوا بكير (ضباب وقت الغروب).'},tr:{n:'Sultan Murat Yaylası ☁️',d:'Bulutların üstü (4.5★). Sıcak giysi al.'}},
 {id:'karester',c:'nat',pr:'kadih',lat:40.6047049,lng:40.266686,r:'4.7',rc:'1015',gf:'na',k:'nature',ar:{n:'يايلا كاريستر (فوق أوزنغول) 🏔️',d:'«جنّة على الأرض» (4.7★) — إطلالة من علو على أوزنغول، أهل كرماء وطبيعة بكر. ⚠️ بعيد (فوق أوزنغول ~٢س)، الطريق ضيّق بالضباب لكن بعد الفنادق بيتحسّن.'},tr:{n:'Karester Yaylası 🏔️',d:'Uzungöl üstü, kuş bakışı (4.7★).'}},
 {id:'beypinari',c:'nat',pr:'kadih',lat:40.7891488,lng:39.3658476,r:'4.8',rc:'138',gf:'careful',k:'nature',ar:{n:'يايلا بيبناري (بحر الغيوم) ☁️',d:'جمال طبيعي خلّاب (4.8★) — بتموز/آب فرصة كبيرة لرؤية بحر الغيوم بعد العصر. جرّبوا «كوكول بيدا» (بيدا رخيصة ولذيذة). ⚠️ دوزكوي ~١.٢٥س جنوب غرب.'},tr:{n:'Beypınarı Yaylası ☁️',d:'Bulut denizi, Kukul Pide (4.8★).'}},
 {id:'isiklar',c:'nat',pr:'kadih',lat:40.838458,lng:39.4629673,r:'4.6',rc:'296',gf:'na',k:'nature',ar:{n:'يايلا إيشيكلار كايا باشي 🏞️',d:'بحيرة محاطة بالجبال والخضرة (4.6★) — مثالي لنزهة يوم كامل وتخييم، مطاعم وفنادق. ⚠️ تجنّبوا عطلة نهاية الأسبوع (زحمة)، اطلعوا قبل الغروب (الطريق ضيّق).'},tr:{n:'Işıklar Kayabaşı Yaylası 🏞️',d:'Göl + dağ, piknik (4.6★).'}},
 {id:'altindere',c:'nat',pr:'kadih',lat:40.6938741,lng:39.6591693,r:'4.5',rc:'7.6 ألف',gf:'na',k:'nature',ar:{n:'وادي ألتينديري الوطني (سوميلا) 🌲',d:'منتزه وطني بمناظر وشلالات وغابات ونهر بارد (4.5★ · ٧٬٥٧٠) — دير سوميلا داخله. ⚠️ غالي: ~€٣٠/شخص + باص إجباري، ودرجات صعبة لكبار السن. اطلعوا بكير.'},tr:{n:'Altındere Vadisi MP 🌲',d:'Sümela içinde, şelaleler (4.5★).'}},
 {id:'palovit',c:'nat',pr:'kadih',lat:40.9413926,lng:40.9933788,r:'4.6',rc:'6.4 ألف',gf:'na',k:'nature',ar:{n:'شلال بالوفيت (ريزة) 💦',d:'شلال آسر وطريق خلّاب (4.6★ · ٦٬٤٠٠). ⚠️⚠️ بعيد جداً (ريزة/تشامليهمشين ~٢.٥س)، الطريق خطر (صخور متساقطة)، والمنصة السفلية مسكّرة أحياناً (مشاهدة من الجانب). للمغامرين فقط.'},tr:{n:'Palovit Şelalesi 💦',d:'Rize, ~2.5s uzak (4.6★). Dikkatli sür.'}},
 {id:'mavigol',c:'nat',pr:'kadih',lat:40.6354716,lng:38.3827369,r:'4.4',rc:'4.9 ألف',gf:'na',k:'nature',ar:{n:'بحيرة مافي غول (شلالات كوزالان) 🩵',d:'بحيرة زرقاء مذهلة وشلالات (4.4★ · ٤٬٩٠٠). ⚠️ بعيد (غيرسون ~١.٥س غرب)، درجات كثيرة للنزول (مش لكبار السن)، الحمامات وسخة. منظر يستاهل لمحبّي الطبيعة.'},tr:{n:'Mavigöl Kuzalan 🩵',d:'Mavi göl + şelale (4.4★). ~1.5s.'}},
 {id:'araklios',c:'nat',pr:'kadih',lat:40.7872695,lng:39.9829091,r:'4.4',rc:'475',gf:'na',k:'nature',ar:{n:'شلال أراكلي أوس 💧',d:'شلال جميل قرب الطريق سهل الوصول (4.4★) — موقف صغير ومقهى بطاقم لطيف. (~٤٥د شرقاً). جيّد كمحطة بالطريق.'},tr:{n:'Araklı Os Şelalesi 💧',d:'Yol kenarı, kolay (4.4★).'}},
 {id:'asmasu',c:'nat',pr:'kadih',lat:40.644532,lng:39.9255469,r:'4.6',rc:'278',gf:'na',k:'nature',ar:{n:'شلال أسماسو 💦',d:'شلال مخبّأ بقلب الجبال ومناظر خلّابة (4.6★) — «كأنه جولة خاصة لإلك». ⚠️ يحتاج دفع رباعي وسائق خبير، آخر ٢.٥كم وعرة وزلقة بالمطر. للمغامرين.'},tr:{n:'Asmasu Şelalesi 💦',d:'Dağlarda gizli (4.6★). 4x4 gerek.'}},
 {id:'kadiralak',c:'nat',pr:'kadih',lat:40.8862732,lng:39.3287969,r:'4.5',rc:'242',gf:'na',k:'nature',ar:{n:'يايلا كاديرالاك (الأزهار الزرقاء) 💙',d:'«قطعة من الجنة» (4.5★) — مشهورة بأزهارها الزرقاء وجدول يشقّها، أهلها كرماء، والطريق لطيف مش متعب. (تونيا ~١.٥س غرب).'},tr:{n:'Kadıralak Yaylası 💙',d:'Mavi çiçekler, dere (4.5★).'}},
 {id:'torulcam',c:'view',pr:'mid',lat:40.5560,lng:39.2900,r:'4.4',rc:'تراس زجاجي',gf:'na',k:'nature',ar:{n:'تراس تورول الزجاجي (Torul) 🌉',d:'🌉 منصّة زجاجية على ارتفاع ٢٤٠م فوق الوادي (تتّسع ٥٠ شخص) بجنب قلعة تورول التاريخية — أدرينالين ومناظر خرافية. غوموشهانه ~٨٥كم على طريق زيغانا، ~٨٠₺، موقف مجاني وركن ألعاب أطفال. محطة ممتازة بيوم سوميلا/زيغانا. ⚠️ مش لمن يخاف المرتفعات.'},tr:{n:'Torul Cam Teras',d:'240m cam teras, Gümüşhane. Sümela/Zigana günü.'}},
 {id:'trabzoncastle',c:'view',pr:'kadih',lat:41.0050,lng:39.7160,r:'4.0',rc:'قلعة',gf:'na',k:'walk',ar:{n:'قلعة طرابزون (Trabzon Kalesi)',d:'🏰 أسوار وأبراج تاريخية (رومانية/بيزنطية/عثمانية) تطلّ على المدينة، ملاصقة لوادي زاغنوس وسط البلد. أطلال مفتوحة مجانية. ⚠️ الأرض غير مستوية — الحديقة أسهل للأطفال. اجمعوها مع وادي زاغنوس.'},tr:{n:'Trabzon Kalesi',d:'Tarihi surlar, Zağnos Vadisi yanı. Ücretsiz.'}},
 {id:'kizlar',c:'view',pr:'kadih',lat:40.9990,lng:39.7280,r:'4.2',rc:'دير',gf:'na',k:'walk',ar:{n:'دير كيزلار / العذارى (Kızlar)',d:'⛪ دير منحوت بالصخر قرب بوزتبه (Panagia Theoskepastos) بإطلالة على المدينة — تاريخي وهادئ. ~٣٠–٦٠₺ (ما بتنفع بطاقة المتحف)، مغلق الاثنين. 🆕 <b>في ممر يربطه مباشرة بشرفة بوزتبه</b> — اجمعوهم بزيارة وحدة (كل واحد بتذكرته).'},tr:{n:'Kızlar Manastırı',d:'Kayaya oyulmuş. Boztepe terası bağlantı yolu var. Pazartesi kapalı.'}},
 {id:'trabzonmuseum',c:'kids',pr:'kadih',lat:41.0028,lng:39.7215,r:'4.4',rc:'متحف',gf:'na',k:'science',new:1,ar:{n:'متحف طرابزون (قصر كوستاكي)',d:'🏛️ قصر تاريخي أنيق بطراز إيطالي (قصر كوستاكي) — <b>أُعيد افتتاحه أيار ٢٠٢٥</b> بعد ترميم طويل. آثار وإثنوغرافيا وأجواء القرن الـ١٩، وسط البلد (Zeytinlik). زيارة قصيرة مناسبة للأطفال الأكبر وكبار السن — داخلي وبارد وقت الحر.'},tr:{n:'Trabzon Müzesi (Kostaki)',d:'Tarihi köşk müzesi, 2025\'te yeniden açıldı. Serin.'}},
 {id:'gulbahar',c:'mosque',pr:'kadih',lat:41.0040,lng:39.7120,r:'4.6',gf:'na',ar:{n:'جامع غولبهار خاتون',d:'🕌 جامع عثماني تاريخي (بناه السلطان سليم لأمّه غولبهار خاتون) وسط البلد قرب وادي زاغنوس. حلو للصلاة والزيارة، قريب من القلعة.'},tr:{n:'Gülbahar Hatun Camii',d:'Tarihi Osmanlı camii, merkez.'}},
 {id:'hanife',c:'mosque',pr:'kadih',lat:41.0060,lng:39.7180,r:'4.8',rc:'جامع جديد',gf:'na',new:1,ar:{n:'جامع هانِفة خاتون (الأكبر) 🕌',d:'🕌 <b>أكبر مسجد بشرق البحر الأسود</b> — افتُتح تموز ٢٠٢٥ على الساحل (بازاركابي). يتّسع ٧٧٠٠ داخل و~١٥٬٠٠٠ مع الأفنية، قبة ٤٢م و٤ مآذن (~٧٧م)، وفيه مكتبة وقاعة. معلم جديد للصلاة والزيارة العائلية، وجنبه منطقة بازاركابي ومركز العلوم.'},tr:{n:'Hanife Hatun Camii',d:'Doğu Karadeniz\'in en büyük camii (2025). 7700+ kapasite.'}},
 {id:'camburnu',c:'nat',pr:'kadih',lat:40.9130,lng:40.1750,r:'4.4',rc:'شاطئ وغابة',gf:'na',k:'nature',ar:{n:'غابة وشاطئ تشامبورنو (Çamburnu) 🌲',d:'🌲 نادر: صنوبر أحمر ينزل حتى مستوى البحر — شاطئ + غابة مع بعض! Sürmene ~٤٨كم شرقاً على طريق الساحل، عائلي وسهل. ⚠️ تعرّض لحريق سابق بس لسا بيستاهل. هدوء بعيد عن الزحام.'},tr:{n:'Çamburnu Tabiat Parkı',d:'Sarıçam + plaj, Sürmene. Sakin, aile dostu.'}},
 {id:'kudavas',c:'nat',pr:'kadih',lat:40.8830,lng:39.2870,r:'4.3',rc:'شلال',gf:'na',k:'nature',ar:{n:'شلال كوداواس (Kudavas) 💦',d:'💦 «جنّة مخفية» بتونيا — حوض طبيعي وانزلاق صخري، حلو للتصوير والمشي. ⚠️ للمجموعة الصغيرة النشطة أفضل، والطريق ريفي. بعيد عن الزحام.'},tr:{n:'Kudavas Şelalesi',d:'Tonya, saklı cennet. Küçük grup için.'}},
 {id:'gulderen',c:'nat',pr:'kadih',lat:40.8900,lng:40.4200,r:'4.4',rc:'شلال',gf:'na',k:'nature',ar:{n:'شلال غولديرين (Gülderen) 💧',d:'💧 شلال متدرّج وسط الغابة على نهر سالماتا (Hayrat) — وصول سهل نسبياً من Of/Hayrat. جميل وهادئ، صار مقصد سياحي مؤخراً. ⚠️ بعيد شرقاً (بحدود ريزه).'},tr:{n:'Gülderen Şelalesi',d:'Hayrat, orman içi kademeli şelale.'}},
 {id:'orumcek',c:'nat',pr:'kadih',lat:40.7500,lng:39.3800,r:'4.6',rc:'غابة',gf:'na',k:'nature',ar:{n:'غابات أورومجك (Örümcek) 🌲',d:'🌲 فيها <b>أطول شوح بأوروبا (٦١.٥م)</b> وأشجار عمرها ~٤٥٠ سنة، محمية طبيعية. Kürtün/غوموشهانه، دخول مجاني. ⚠️⚠️ بعيدة جداً (رحلة يوم كامل) وآخر الطريق ترابي — لمحبّي الطبيعة البكر فقط.'},tr:{n:'Örümcek Ormanları',d:'Avrupa\'nın en uzun köknarı (61.5m). Çok uzak.'}},
 {id:'solma',c:'nat',pr:'kadih',lat:40.7900,lng:39.6100,r:'4.4',rc:'يايلا',gf:'na',k:'nature',ar:{n:'يايلا شولما (Şolma) 🏞️',d:'🏞️ «أهدأ يايلا» بكارادنيز (Maçka ~٢٢–٥٠كم) — غنية بأزهار الجبال ومناطق تخييم آمنة. لمحبّي الهدوء بعيداً عن الزحام. ⚠️ بعض الطريق وعر.'},tr:{n:'Şolma Yaylası',d:'En sakin yayla, dağ çiçekleri, Maçka.'}},

/* storage (Supabase → window.storage → in-memory) */
const HAS_STORE=(typeof window!=='undefined'&&window.storage&&typeof window.storage.get==='function');
const LOCPFX='fambam:loc:';
const mem={};
async function sget(k){
  if(SB){try{
    if(k.startsWith(LOCPFX)){const id=k.slice(LOCPFX.length);const{data}=await SB.from('fb_locations').select('*').eq('room',ROOM).eq('id',id).maybeSingle();return data?{id:data.id,nm:data.nm,em:data.em,lat:data.lat,lng:data.lng,ts:data.ts}:null;}
    const{data}=await SB.from('fb_state').select('val').eq('room',ROOM).eq('k',k).maybeSingle();return data?data.val:null;
  }catch(e){return null;}}
  if(HAS_STORE){try{const r=await window.storage.get(k,true);return r?JSON.parse(r.value):null;}catch(e){return null;}}
  return mem[k]??null;}
async function sset(k,v){mem[k]=v;
  if(SB){try{
    if(k.startsWith(LOCPFX)){const id=k.slice(LOCPFX.length);if(v===null){await SB.from('fb_locations').delete().eq('room',ROOM).eq('id',id);}else{await SB.from('fb_locations').upsert({room:ROOM,id,nm:v.nm,em:v.em,lat:v.lat,lng:v.lng,ts:v.ts});}return;}
    await SB.from('fb_state').upsert({room:ROOM,k,val:v});return;
  }catch(e){}}
  if(HAS_STORE){try{await window.storage.set(k,JSON.stringify(v),true);}catch(e){}}}
async function slist(p){
  if(SB){try{
    if(p===LOCPFX){const{data}=await SB.from('fb_locations').select('id').eq('room',ROOM);return (data||[]).map(r=>LOCPFX+r.id);}
    const{data}=await SB.from('fb_state').select('k').eq('room',ROOM).like('k',p+'%');return (data||[]).map(r=>r.k);
  }catch(e){return [];}}
  if(HAS_STORE){try{const r=await window.storage.list(p,true);return (r&&r.keys)?r.keys:[];}catch(e){return [];}}
  return Object.keys(mem).filter(k=>k.startsWith(p));}

/* prayer times */
const DEG=Math.PI/180;
function sinD(x){return Math.sin(x*DEG)}function cosD(x){return Math.cos(x*DEG)}function tanD(x){return Math.tan(x*DEG)}
function asinD(x){return Math.asin(x)/DEG}function acosD(x){return Math.acos(x)/DEG}function atan2D(y,x){return Math.atan2(y,x)/DEG}
function fixA(a){a=a%360;return a<0?a+360:a}function fixH(h){h=h%24;return h<0?h+24:h}
function jdate(y,m,d){if(m<=2){y--;m+=12;}const A=Math.floor(y/100),B=2-A+Math.floor(A/4);return Math.floor(365.25*(y+4716))+Math.floor(30.6001*(m+1))+d+B-1524.5;}
function sunPos(jd){const D=jd-2451545.0;const g=fixA(357.529+0.98560028*D),q=fixA(280.459+0.98564736*D);const L=fixA(q+1.915*sinD(g)+0.020*sinD(2*g)),e=23.439-0.00000036*D;const RA=fixH(atan2D(cosD(e)*sinD(L),cosD(L))/15);return {decl:asinD(sinD(e)*sinD(L)),eqt:q/15-RA};}
function prayerTimes(y,m,d,lat,lng,tz){const jd=jdate(y,m,d)+(12-tz)/24;const sp=sunPos(jd);const decl=sp.decl;const noon=fixH(12+tz-lng/15-sp.eqt);function HA(alt){let c=(sinD(alt)-sinD(lat)*sinD(decl))/(cosD(lat)*cosD(decl));c=Math.max(-1,Math.min(1,c));return acosD(c)/15;}const asrAlt=atan2D(1,1+tanD(Math.abs(lat-decl)));return {fajr:fixH(noon-HA(-18)),sunrise:fixH(noon-HA(-0.833)),dhuhr:fixH(noon+0.0167),asr:fixH(noon+HA(asrAlt)),maghrib:fixH(noon+HA(-0.833)),isha:fixH(noon+HA(-17))};}
function hm(h){let H=Math.floor(h),M=Math.round((h-H)*60);if(M===60){M=0;H++;}H=fixH(H);return (H<10?'0':'')+H+':'+(M<10?'0':'')+M;}

/* weather */
function wxEmoji(c){if(c===0)return '☀️';if(c<=2)return '🌤️';if(c===3)return '☁️';if(c<=48)return '🌫️';if(c<=67)return '🌧️';if(c<=77)return '🌨️';if(c<=82)return '🌦️';if(c<=99)return '⛈️';return '⛅';}
async function fetchWeather(){try{const r=await fetch('https://api.open-meteo.com/v1/forecast?latitude=41.0027&longitude=39.7168&current=temperature_2m,weather_code&daily=temperature_2m_max,temperature_2m_min,weather_code&timezone=auto&forecast_days=16');const j=await r.json();if(j.current)WX.now={t:Math.round(j.current.temperature_2m),c:j.current.weather_code};if(j.daily)j.daily.time.forEach((d,i)=>{WX.daily[d]={mx:Math.round(j.daily.temperature_2m_max[i]),mn:Math.round(j.daily.temperature_2m_min[i]),c:j.daily.weather_code[i]};});}catch(e){WX.fail=true;}updateDateWx();if(USER){renderDays();}}
function dayWx(dt){const key=`${dt.y}-${String(dt.m).padStart(2,'0')}-${String(dt.d).padStart(2,'0')}`;const w=WX.daily[key];if(w)return `${wxEmoji(w.c)} ${w.mn}°/${w.mx}°`;return LX('🌤️ متوسط تموز ~٢٠°/٢٦° (رطب، زخّات محتملة)','🌤️ Tem ort. ~20°/26°','🌤️ Jul avg ~20°/26° (humid, showers likely)');}
function updateDateWx(){const d=new Date();let ds;try{ds=d.toLocaleDateString(LX('ar-EG','tr-TR','en-GB'),{weekday:'long',day:'numeric',month:'long'});}catch(e){ds=d.toDateString();}
  document.getElementById('dateTxt').textContent='📅 '+ds;
  const wxEl=document.getElementById('wxTxt');
  if(WX.now)wxEl.textContent=`${wxEmoji(WX.now.c)} ${WX.now.t}° ${LX('طرابزون','Trabzon','Trabzon')}`;
  else if(WX.fail)wxEl.textContent=LX('🌤️ طرابزون ~٢٤°','🌤️ Trabzon ~24°','🌤️ Trabzon ~24°');}

function stopPresence(){if(presTimer){clearInterval(presTimer);presTimer=null;}}
async function getOnline(){const keys=await slist('fambam:pres:');const now=Date.now(),out=[];for(const k of keys){const v=await sget(k);if(v&&v.ts&&now-v.ts<95000)out.push(v);}return out;}
async function renderPresence(){const bar=document.getElementById('presbar');if(!bar||!USER){if(bar)bar.innerHTML='';return;}const on=await getOnline();if(!on.length){bar.innerHTML='';return;}const others=on.filter(o=>o.id!==USER.id);const label=LANG==='ar'?`معنا الآن (${on.length})`:`Çevrimiçi (${on.length})`;bar.innerHTML=`<span class="pb-lbl">${label}</span>`+on.map(o=>`<span class="pb-who">${o.em} ${o.id===USER.id?(LX('أنت','sen','you')):o.nm}</span>`).join('');}
function setUchip(){const nm=USER.tronly?'Sibel':(LANG==='ar'?USER.ar:USER.tr);document.getElementById('uchip').innerHTML=`${USER.em} ${nm} ${USER.admin?'👑':''} <span style="opacity:.6">↩</span>`;}
const LANGLBL={ar:'العربية',tr:'Türkçe',en:'English'};
function toggleLangMenu(e){if(e){e.stopPropagation();}const m=document.getElementById('langmenu');const open=m.classList.toggle('open');if(open){setTimeout(()=>document.addEventListener('click',closeLangMenu),0);}}
function closeLangMenu(){const m=document.getElementById('langmenu');if(m)m.classList.remove('open');document.removeEventListener('click',closeLangMenu);}
function setLang(l){LANG=l;try{localStorage.setItem('fambam_lang',l);}catch(e){}closeLangMenu();applyLang();if(USER)renderAll();else buildRoster();}
function toggleLang(){LANG=(LANG==='ar')?'tr':(LANG==='tr')?'en':'ar';try{localStorage.setItem('fambam_lang',LANG);}catch(e){}applyLang();if(USER)renderAll();else buildRoster();}
const ENP={zorlu:{d:'Your stay — the Black Sea’s first 5-star, in the heart of Meydan. Restaurants: Façuna (fish), La Couronne D’or (fine dining), Cafe’Z (desserts). 🚫🌾 A celiac guest found gluten-free bread + an omelette station at breakfast — but the buffet carries a contamination risk, so confirm with the chef. Turkish bath, spa & pool 7am–10pm.'},xakademi:{d:'🚫🌾 The only 100% dedicated gluten-free cafe in Trabzon (4.8★) — the safest spot for Raya, zero contamination worries. Bread, pizza, burgers and cake all safe. Beleli/Ortahisar (~15–20 min east by taxi). Daily 9am–11pm. ☎️ 0546 828 07 61.'},outlier:{d:'☕ Trabzon’s first real specialty coffee shop (5.0★) — V60 and pour-over, Ethiopian beans and skilled baristas who explain and sometimes gift you a bag. Yomra (~15 km east, near the airport). For anyone who wants serious specialty coffee.'},mitlog:{d:'☕ Roastery & specialty (4.9★) — V60, pour-over and drip; they roast their own beans. Beşirli (~6 km west). ⚠️ Closed Sunday. You can buy freshly roasted beans.'},frenza:{n:'FRENZA Coffee (Downtown)',d:'☕ Specialty coffee in the heart of Trabzon, close to the hotel (4.9★) — V60, cappuccino and an amazing blueberry brownie; the owner speaks English. The nicest, easiest-to-reach specialty option nearby.'},kafeindeposu:{d:'☕ One of Trabzon’s best specialty spots (4.7★) — excellent V60 and Guatemalan beans. Near Forum. ⚠️ Limited seating — good for takeaway.'},pizzalocale:{d:'🚫🌾 Excellent Italian pizza (4.8★) — with great gluten-free options (celiac diners praised them). On Yavuz Selim street downtown, very close to the hotel! Thin crust, fresh ingredients. ⚠️ Shared kitchen — confirm cross-contamination steps for celiac. Daily until midnight.'},guzeli:{d:'🚫🌾 An upscale ’gluten-sensitive’ (glutensiz) cafe with warm decor and a fireplace (4.4★) — cake, coffee, tea and small gifts. On Kunduracılar street downtown (near the ladies’ gold market!). ⚠️ A bit pricey. Closed Sunday.'},taksimgurme:{n:'Taksim Gurme (Charcuterie)',d:'🚫🌾 A fine cheese & local-produce shop (5.0★) — friendly to vegans and gluten-free per customers. Premium cheeses, butter and buffalo yogurt. Downtown on Taksim street. Great for prepping safe snacks for Raya.'},espressolab:{d:'Specialty coffee, heart of downtown. (Ahmad-approved ☕)'},nevada:{d:'Specialty coffee + an amazing San Sebastián cheesecake.'},leefor:{n:'Leefor Cafe & Patisserie 💎',d:'⭐ The best breakfast in Trabzon per visitors (4.9★) — an elegant, clean spot with a view, great variety and taste, cheaper than others. (Baked goods contain wheat.)'},radisson:{n:'Radisson Blu — View & Restaurant 💎',d:'5-star in Boztepe with a panoramic Black Sea view (4.4★) — breakfast with a stunning view. Lovely even just for a meal or coffee.'},novotel:{n:'Novotel Trabzon — Spa & Restaurant 💎',d:'An upscale hotel (4.4★) with a garden and sea view — ’couples’ massage among the best’, spacious comfortable restaurant. Near Cevahir mall.'},seralakeresort:{n:'Sera Lake Resort — Spa & Lake 💎',d:'A resort on Sera Lake (4.4★) — spa, sauna, massage, a gorgeous lake view and a rich breakfast. Calm and relaxing (~12 km).'},platin61:{d:'Turkish coffee and fine sweets downtown (5.0★) — excellent baklava and Turkish delight; lovely owners. (Sweets contain wheat.)'},huna:{d:'Upscale coffee and bakery with a view, downtown (4.3★) — ’best croissant’, warm vibe. (Baked goods contain wheat.)'},lobby:{d:'Among the best coffee in Trabzon (4.4★) — V60, fresh pastries and an elegant vibe (Yomra, near Cevahir).'},coffeeway:{n:'Way Coffee & Bakery 💎',d:'☕ A new-concept cafe/bakery that opened <b>June 2026</b> (4.9★) — pods with a TV and games, a VIP cinema hall and 5 separate VIP rooms. Pelitli, opposite the Hayri Gür arena. Great for groups and families, halal.'},bernek:{n:'Bernek Restaurant (Hıdırnebi Plateau)',d:'🍽️ Home cooking & breakfast on the Hıdırnebi plateau with a stunning mountain view (4.9★) — traditional halal food, the chef is the owner; clean, quiet and very generous. The best place to eat if you head up to the plateau for nature (outside the festival day). Daily 8am–12am.'},happymoons:{n:'Happy Moon’s — Forum (upscale)',d:'🍽️ The upscale restaurant in Trabzon’s most famous mall (Forum) — an ’affordable luxury’ chain; the Trabzon branch is alcohol-free (family-friendly) ✅. Burgers, steak, pasta, desserts, coffee; great service (4.1★, 984). 🚫🌾 It has options that can suit gluten but <b>you must ask the staff</b> and confirm for celiac (shared kitchen). Daily 8am–12am.'},berweuli:{d:'⭐ The only Trabzon spot listed in the Turkish celiac guide. Chef Eşref Keskin makes ~60 gluten-free items (köfte, GF etli ekmek). A restored historic house overlooking the grand mosque and the sea, reasonably priced. ⚠️ Shared kitchen (not dedicated) — confirm the contamination protocol and ask for an indoor non-smoking table. ☎️ 0542 379 38 54.'},kalkanoglu:{n:'Tarihi Kalkanoğlu Pilavı 💎',d:'A Trabzon icon since 1856 (4.3★ · 3,600) — rice with ’exceptional’ meat broth, beans and buttered meat; a heritage experience. Closed Sunday.'},bordomavi:{n:'Bordo Mavi Balık 💎',d:'Trabzon’s most famous fish restaurant — chef Erşan Yılmaz (also a Dubai branch). Seafood soup, grilled sea bass, shrimp, anchovy. Sea & city view, halal & alcohol-free. ⚠️ Honest: its Tripadvisor rating is average (3.8★ despite the fame), and it’s a <b>small two-floor place not suited to big groups</b>, up a steep narrow winding road. Grilled is GF-safe. Reservation: ☎️ 0462 351 3888.'},ganitar:{n:'Ganita Restaurant 💎',d:'Fish and breakfast with a magical sea view on the Ganita promenade (4.6★ · 3,250) — ’best meal in Turkey’, nice prices. ⚠️ Small parking. Grilled is safe.'},botanik:{n:'Trabzon Botanik 💎',d:'A restaurant in a botanical garden with a captivating view (4.6★) — relaxed vibe, tasty dishes, generous portions and reasonable prices.'},karnivor:{n:'Karnivor Steakhouse 💎',d:'The fanciest steakhouse (4.3★) — ’best steak of my life’, cooked at your table, staff speak Arabic and English. Grills are safe.'},modatepe:{n:'Modatepe Restoran & Bungalov 💎',d:'A mountain restaurant with a stunning view (4.3★) — ’a gem worth the drive’, breakfast, healing vibes and bungalows. ~30–40 min south.'},denizyildizi:{n:'Deniz Yıldızı 💎',d:'Fish with a sea view (4.2★ · 3,130) — free watermelon, baklava and tea; the grilled karagöz is ’the best fish in Turkey’. Arsin, ~25 min east.'},suvva:{n:'Suvva Restaurant 💎',d:'A view of the sea, forest and the Trabzonspor stadium (4.2★) — upscale vibe and halls. ⚠️ Focus on the starters, tea and the view.'},asimer:{n:'Asimer — Turkish Breakfast 💎',d:'An ideal traditional Turkish breakfast (4.4★) — kuymak and muhlama ’done to perfection’, warm homey vibe. Start and end your trip here. (Bread is wheat.)'},meselik:{n:'Meşelik Bahçe — Breakfast & Grill 💎',d:'Serpme breakfast and grills out in nature (4.4★) — all-day breakfast, green views, family-friendly. Near Ramada.'},boztepe:{n:'Boztepe Terrace',d:'Panorama + a glass bridge kids love + samovar tea and a sea sunset. A local favorite. ⚠️ Some cafes are pricey (tea ~70₺) — ask the price first. 9am–9pm.'},ganita:{n:'Ganita Promenade',d:'The prettiest seaside walk at sunset.'},uzungol:{n:'Uzungöl (day trip)',d:'A beautiful mountain lake, ~95–99 km / 1.5 h. ⚠️⚠️ Warning: it has become commercial and a tourist trap — overpriced shops and restaurants. If you go: arrive in the afternoon for parking, and eat before/after, not at the lakeside restaurants.'},botanikbahce:{n:'Botanical Garden (Botanik Bahçesi)',d:'🌷 A quiet gem on a hill overlooking the Black Sea and mountains (4.5★, 6,745) — flowers, paths and wooden bridges, plus rabbits and deer for the kids 🐰🦌, and a café in the middle with great breakfast at fair prices. Free parking, calmer on weekdays. ~4 km west of center (short taxi). Very family-friendly.'},meydanpark:{n:'Meydan Park (Downtown)',d:'🌳 Trabzon’s beating heart, minutes’ walk from the hotel (4.4★) — a green space ringed by cafes, restaurants and shops. A European feel; sit in the park or at an edge café and people-watch. In summer there are near-daily Turkish folk-dance shows. The nicest spot for a short evening stroll.'},farozliman:{n:'Faroz Fishing Harbor (sunset)',d:'🌅 A colorful, calm fishing refuge on the coast (4.5★) — painted fishermen’s houses, seagulls, and the best sunset in Trabzon. Bring your own food and sit by the sea (they only sell drinks). Magical at sunrise or sunset. ~3 km west of center along the coast road.'},limni:{n:'Limni Lake (nature park)',d:'🏞️ A small lake atop the mountain amid pines, with a waterfall and a sea of clouds (4.1★). Has a restaurant, café, toilets, parking, a mosque, a playground and picnic tables. On the Hamsiköy/Zigana road (~85 km / 1.5 h south). ⚠️ The road is narrow and unlit at night — go by day and return before dark, and watch for fog.'},calcamili:{n:'Çalcamili Nature Park',d:'🌲 An oxygen-rich green forest near Çal Cave (4.5★) — a calm spot for a picnic and relaxing with family. Düzköy (~50 km / 1 h southwest). ⚠️ The toilets are old and need maintenance. Combine it with Çal Cave the same day.'},kadirga:{n:'Kadırga Plateau + open-air mosque',d:'⛰️ A plateau at ~2,400 m with crisp air and surreal views (4.7★) — and a historic open-air mosque (no walls or roof) where you pray under the sky. Paved roads. ⚠️ Far (~2.5 h) and cold even in summer — take jackets. An adventure trip for highland lovers.'},hamsikoy:{n:'Hamsiköy Village (rice pudding)',d:'🏘️ A charming mountain village on the Sumela/Zigana road (~50 km / 1 h) — famous for Turkey’s best ’sütlaç’ (rice pudding), plus köfte and cool green air. A perfect stop on the way to the mountains. Look for Pervanoğlu restaurant for the original.'},cosandere:{n:'Çoşandere Valley (Sumela road)',d:'🌊 A green valley by the river, wooden buildings and souvenir shops, on the Sumela road (km 5). A lovely rest stop in nature before/after Sumela. Calm and refreshing. (Few reviews, but a beautiful spot.)'},meryemana:{n:'Meryemana Valley (Altındere)',d:'🏞️ The stunning green valley below Sumela Monastery inside Altındere National Park (4.4★) — old stone bridges, walking among the trees and the sound of water. ⚠️ The walk is ~7 km uphill and can be slippery in rain. Combine it with a Sumela visit.'},caglayan:{n:'Çağlayan Waterfall (Rize)',d:'💦 A pretty waterfall in a green valley between Of and Rize (4.4★) — parking nearby then a ~10 min walk. ⚠️ Far (in Rize province), the road is narrow and a bit risky, and the village isn’t set up for tourism. For adventurers only — the view is worth it.'},zigana:{n:'Zigana Mountain & Pass',d:'🏔️ A famous high mountain pass (~2,030 m) between Trabzon and Gümüşhane — green views and a summer sea of clouds, a ski resort in winter, and Turkey’s longest tunnel (Zigana) on the way. ~65 km / 1 h south, on the way to Limni Lake and Hamsiköy. ⚠️ Winding mountain road.'},sumela:{n:'Sumela Monastery (day trip)',d:'A Byzantine monastery clinging to the cliff, ~45 km / 1 h south. Entry ~€20, open 8am–5pm but last ticket 4:30pm. Shuttle + a climb and stairs. ⚠️ Steep stairs but doable for the 6- and 11-year-olds. Dress modestly. Go in the morning.'},cephanelik:{n:'Cephanelik Cafe & Restaurant 💎',d:'An upscale panorama from Boztepe near the hotel (~1.5 km). Lovely at sunset.'},hidirnebi:{n:'Hıdırnebi Plateau',d:'A 1,600 m plateau locals flock to in summer — cool air, mist and a sea of clouds. ~1 h (Akçaabat–Düzköy). Festival ~13–20 July. Take a jacket.'},sisdagi:{n:'Sis Dağı Plateau',d:'The ’mist mountain’ — pastures and clouds, with a festival on the third Saturday of July. A bit farther but magical.'},calcave:{n:'Çal Cave (Çal Mağarası)',d:'One of the world’s longest caves — a walkway, an internal waterfall and a pleasant chill. ~45 min–1 h (Düzköy). An adventure kids love.'},boztepeteras:{n:'Boztepe Terrace (Volkan Konak) 🏔️',d:'⭐ A free panoramic lookout over Trabzon and the Black Sea (4.5★) — wooden walkways, a small glass bridge and cafes. Easy and close (~5 min), lovely at sunset. Best for the family.'},sultanmurat:{n:'Sultan Murat Plateau ☁️',d:'A plateau above the clouds with breathtaking views (4.5★ · 8,640) — green hills, a beautiful mosque and wooden houses. ⚠️ Far (~2 h southeast, Çaykara), bring warm clothes, go early (fog at sunset).'},karester:{n:'Karester Plateau (above Uzungöl) 🏔️',d:'“Heaven on earth” (4.7★) — a lofty view over Uzungöl, generous locals and pristine nature. ⚠️ Far (above Uzungöl ~2 h); the road is narrow in fog but improves past the hotels.'},beypinari:{n:'Beypınarı Plateau (sea of clouds) ☁️',d:'Breathtaking natural beauty (4.8★) — in July/August a great chance to see a sea of clouds in the afternoon. Try ’kokol pide’ (cheap, tasty pide). ⚠️ Düzköy ~1.25 h southwest.'},isiklar:{n:'Işıklar Kaya Başı Plateau 🏞️',d:'A lake ringed by mountains and greenery (4.6★) — ideal for a full-day outing and camping, with restaurants and hotels. ⚠️ Avoid weekends (crowded), go before sunset (narrow road).'},altindere:{n:'Altındere National Park (Sumela) 🌲',d:'A national park with views, waterfalls, forests and a cold river (4.5★ · 7,570) — Sumela Monastery is inside. ⚠️ Pricey: ~€30/person + a mandatory bus, and hard stairs for the elderly. Go early.'},palovit:{n:'Palovit Waterfall (Rize) 💦',d:'A captivating waterfall and a gorgeous drive (4.6★ · 6,400). ⚠️⚠️ Very far (Rize/Çamlıhemşin ~2.5 h), the road is dangerous (falling rocks), and the lower platform is sometimes closed (view from the side). For adventurers only.'},mavigol:{n:'Mavi Göl (Kuzalan Falls) 🩵',d:'A stunning blue lake and waterfalls (4.4★ · 4,900). ⚠️ Far (Giresun ~1.5 h west), many steps down (not for the elderly), dirty toilets. The view is worth it for nature lovers.'},araklios:{n:'Araklı Ovs Waterfall 💧',d:'A pretty, easy-to-reach waterfall near the road (4.4★) — small parking and a café with friendly staff. (~45 min east). Good as a stop along the way.'},asmasu:{n:'Asmasu Waterfall 💦',d:'A hidden waterfall deep in the mountains with stunning views (4.6★) — ’like a private tour just for you’. ⚠️ Needs a 4x4 and an experienced driver; the last 2.5 km is rough and slippery in rain. For adventurers.'},kadiralak:{n:'Kadıralak Plateau (blue flowers) 💙',d:'“A piece of heaven” (4.5★) — famous for its blue flowers and a stream running through it, generous locals, and an easy, non-tiring road. (Tonya ~1.5 h west).'},kosk:{n:'Atatürk Köşkü + park',d:'Family picnic, sea view. 9am–7pm.'},bilim:{n:'Trabzon Science Center',d:'Free, hands-on experiments. ⚠️ Closed Monday.'},zagnos:{n:'Zağnos Valley Park',d:'Ducks and rabbits. Free, walkable from the hotel.'},sera:{n:'Sera Lake (pedal boats)',d:'Duck boats kids adore. ~20 min.'},teleferik:{n:'Beşiküzü Cable Car',d:'The longest cable car on the Black Sea (3,600 m, ~10 min to the top, 55-person cabins). ~45 min west. Daily 10:30–17:00.'},akvaryum:{n:'Trabzon Aquarium',d:'A fun aquarium for kids (~300₺). Indoor — ideal if it’s hot.'},besirlieco:{n:'Beşirli Eco Park (rabbits & turtles) 🐰',d:'A fun family park for kids (4.3★) — rabbits, turtles and birds (bring food for the rabbits), a playground, a bridge, a ’space road’, a café, a prayer room and clean toilets. Free.'},forum:{n:'Forum Trabzon AVM',d:'The biggest and cleanest mall around (4.2★ · 23k) — Turkish and global brands, a sea-view food court, cinema, and a Migros with a gluten-free shelf. ⚠️ Not cheap even on sale, and parking gets crowded.'},rubenis:{n:'Rubenis (formerly Varlıbaş) AVM',d:'Trabzon’s third mall in Atapark (3.5★ · 4,800) — smaller and quieter, Turkish brands. ⚠️ Some shops have closed. Plus: near historic sites (Gülbahar Mosque, Zağnos Valley, Fatih).'},cevahir:{n:'Trabzon Cevahir Outlet (Yomra)',d:'A cheaper outlet east of the city (3.8★ · 9,500) — outlet prices (e.g. Mavi), a sea-view food-court terrace, and a kids’ luna park. Popular with Gulf tourists. ⚠️ Some reviews say it’s small/average.'},migros:{n:'Migros (inside Forum)',d:'🚫🌾 A big supermarket (4.0★) inside Forum — a ’Glutensiz’ shelf for Raya (Dr. Schär). Look for ’Glutensiz’/’Gluten içermez’.'},carsi:{n:'Çarşı Mosque',d:'In the middle of the market, near the hotel — good for Friday prayer.'},fatih:{n:'Ortahisar Fatih Mosque',d:'A grand historic mosque (was a church).'},ayasofya:{n:'Hagia Sophia Mosque',d:'Historic with a sea view. Free entry.'},bedesten:{n:'Bedesten (gifts)',d:'A historic covered market for gifts.'},kunduracilar:{n:'Kunduracılar Street (gold 💍)',d:'The heart of local shopping and the famous goldsmiths’ street — the renowned Trabzon ’hasır’ gold bangles and silverware. Fun walking alleys downtown.'},lcw:{d:'A popular Turkish brand — great quality and value for families, wide selection.'},mango:{d:'Global — elegant, modern women’s fashion.'},hm:{d:'Global — fashion at mid-range prices. ⚠️ Sometimes they don’t accept QR payment.'},koton:{d:'Turkish women’s wear — jeans and basics. ⚠️ The branch is small and crowded.'},defacto:{d:'Turkish — budget prices and a family range (Cevahir mall).'},mavi:{n:'Mavi (jeans)',d:'Turkey’s most famous jeans — at outlet prices in the Cevahir branch.'},colins:{n:'Colin’s (jeans)',d:'Turkish — jeans and casual.'},boyner:{n:'Boyner (multi-brand)',d:'A big store with many brands and good discounts + a makeup section. A one-stop destination.'},lacoste:{d:'Upscale global — polos and smart casual.'},penti:{d:'Turkish — socks, underwear, loungewear and swimwear.'},suwen:{d:'Turkish — women’s lingerie and loungewear.'},kayra:{n:'Kayra (modest fashion)',d:'Turkish — elegant modest women’s fashion.'},sephora:{d:'The best — global makeup, skincare and fragrance brands, a huge selection and helpful staff.'},watsons:{d:'Skincare, makeup, fragrance and serums. Also branches in Meydan and Cevahir.'},gratis:{d:'Makeup and skincare at nice prices. ⚠️ Important: check your receipt and confirm prices — recurring complaints about added ’free’ products being charged and price hikes for tourists.'},mac:{d:'Upscale global makeup. ⚠️ Make sure the product is sealed and new (some complaints about opened testers).'},yvesrocher:{d:'French botanical fragrance and skincare — high quality. Also a branch in Meydan.'},nike:{d:'The official Nike store — shoes and sportswear. (Some models aren’t always in stock.)'},adidas:{d:'The official Adidas store — shoes and sportswear for women and men.'},flo:{d:'Turkey’s most famous shoe chain — a huge range and varied prices. Also branches in Meydan and Atapark.'},deichmann:{d:'A German shoe chain — family footwear at reasonable prices and deals.'},derimod:{n:'Derimod (leather)',d:'A Turkish leather brand — leather shoes and bags, best during sales. ⚠️ Some complaints about durability.'},hotic:{d:'An elegant, modern Turkish shoe brand — ’the most on-trend models’. Tempting deals.'},inci:{d:'A well-known Turkish women’s shoe and bag brand.'},floatapark:{n:'FLO (Atapark)',d:'The FLO branch in Atapark mall — organized by size and cheaper than other branches per visitors.'},akvaryum:{n:'Tünel Akvaryum (Tunnel Aquarium)',d:'🐠 The world’s first aquarium built inside a tunnel (4.3★) — a 300 m walkway, 61 tanks and 5,000+ sea creatures. Shark feeding Tue/Thu/Sat/Sun 3:30–3:45pm. Daily 10am–6pm (longer in summer). Indoor & air-conditioned — ideal in the heat. Downtown at Zağnos Valley.'},bilim:{n:'Özdemir Bayraktar Science Center',d:'🔬 The first science center in the Eastern Black Sea (opened 2023) — 42 interactive exhibits + an 80-seat planetarium. Free entry; planetarium ~100₺ (student 50). Indoor, cool and educational. ⚠️ Closed Monday — confirm hours.'},zagnos:{n:'Zağnos Valley + Adventure Park 🎢',d:'🎢 A green valley downtown (free, walkable from the hotel) — ducks, rabbits, paths and fountains. Newest addition (July 2025): an <b>adventure park</b> with a zipline (150₺), rope course, hill slide, carousel (75₺) and a kids’ digger. Great for older kids (6–14). Very close to the aquarium and bird park.'},teleferik:{n:'Beşikdağ Cable Car (Beşikdüzü)',d:'🚡 The longest cable car on the Black Sea (3,010 m) up to a 531 m summit — two cabins, up and down. ~45 min west (Beşikdüzü). Daily 10:30–17:30. ~80₺ for citizens, USD for foreigners (~$12). Parking at the lower station. ⚠️ A cable car <b>inside Trabzon city doesn’t exist yet</b> (future project) — this is the nearest working one.'},kusparki:{n:'Bird Park (Kuş Parkı) 🦜',d:'🦜 Right next to the aquarium — 27 bird species (peacocks, parrots, owls) with a first-class zoo license. A cheap separate ticket; visit both together. Tickets 10am–7pm.'},tilya:{n:'Tilya Aquapark 💦',d:'💦 The main water park in the area — a kids pool + 6 big slides, with a Black Sea view. Darıca/Akçaabat (~30 min west). Daily 10am–7pm, entry ~€10. Ideal in the heat. ⚠️ No outside food allowed.'},lunapark:{n:'Luna Park (İpek Yolu Fuar) 🎡',d:'🎡 A funfair at the fairground near the coast — various rides, entry ~50–150₺ depending on the ride. Opens evenings in summer. ⚠️ <b>Safety note:</b> a ride incident occurred in 2025 — stick to age-appropriate rides and check the safety belts.'},playland:{n:'Playland / Wowland (Atapark Mall)',d:'🎮 An indoor play center in Atapark mall (Rubenis, formerly Varlıbaş) — games and a trampoline for kids and teens, ticketed. Air-conditioned — a great backup in rain or heat. 10am–10pm.'},farozboat:{n:'Faroz Harbor Boat Tour ⛵',d:'⛵ Rent a private boat from Faroz harbor (up to ~10 people/boat — you’d need two for 19) for a coastal sea tour. Fun for kids and adults, best at sunset. Downtown.'},bordomavi:{n:'Bordo Mavi Balık 💎',d:'Trabzon’s most famous fish restaurant — chef Erşan Yılmaz (also a Dubai branch). Seafood soup, grilled sea bass, shrimp, anchovy. Sea & city view, halal & alcohol-free. ⚠️ Honest: its Tripadvisor rating is average (3.8★ despite social-media fame) and some locals find it pricey/touristy — compare. Grilled is GF-safe (avoid flour-fried). Reservation: ☎️ 0462 351 3888 (book on weekends).'},ganitar:{n:'Ganita Restaurant 💎',d:'Fish and breakfast with a magical sea view on the Ganita promenade (4.6★ · 3,250) — “best meal in Turkey”, nice prices. <b>Municipality-run, alcohol-free</b> with a kids play corner — great for 19. ⚠️ Small parking. Grilled is safe.'},cemilusta:{n:'Cemil Usta (Akçaabat Köfte)',d:'A 70+ year legacy: Akçaabat köfte, grills and baklava, ~5 min from the hotel, halal & alcohol-free, open ~24h. Reservation: ☎️ 0462 228 91 04. (Baklava/köfte are wheat — for GF, grills only.)'},inan:{n:'İnan Kardeşler (Uzungöl)',d:'🐟 The oldest venue in Uzungöl (since 1974) and <b>seats 300</b> — ideal for the group of 19! Trout (alabalık), kuymak, muhlama and sütlaç, with live Black Sea music in the evening, halal & alcohol-free. Reservation: ☎️ 0462 656 62 60. For GF: grilled fish + kuymak (confirm corn flour).'},nihatusta:{n:'Nihat Usta (Akçaabat Köfte)',d:'🍢 Akçaabat köfte, fish (mezgit) and Laz böreği — <b>huge capacity (600–1200)</b>, and its Akçaabat branch holds a Guinness record for the longest restaurant facade (190 m)! The Değirmendere branch is near Forum, with a kids play area and sea view. Halal & <b>alcohol-free</b> (the owner confirmed: “I have never served alcohol”). ~8am–11pm. Reservation: ☎️ 0462 228 00 50. ⚠️ Service dips at peak times. For GF: grilled (köfte has bread).'},kaanolta:{n:'Kaan Olta Balık (summer garden)',d:'🐟 Fish in a big summer garden in Akçaabat/Yıldızlı — family-friendly and comfortable for groups, halal & alcohol-free, year-round. Grilled is GF-safe.'},seyrisefa:{n:'Seyri Sefa (Boztepe view)',d:'🌆 A restaurant with a panoramic Boztepe view (Çamlık Sk.) — family-friendly, halal & alcohol-free, 8am–10pm. Reservation (esp. weekends): ☎️ 0462 321 45 36. Grilled options are safe.'},sumelacamp:{n:'Sümela Camping (Sümer / Panço)',d:'🌲 A riverside restaurant under the trees on the Sumela road — a <b>fresh trout farm</b>, traditional breakfast (kuymak/muhlama), a kids play area and free spacious parking, ~200–400₺/person. A perfect stop on your Sumela day. For GF: grilled fish.'},zivera:{n:'Zivera (village breakfast) 🍳',d:'🍳 A homey village breakfast amid greenery in Yomra (Çamlıca) — a local favorite, traditional halal Black Sea cooking. Great for families, but <b>book ahead</b> for 19. For GF: kuymak (confirm corn flour) + eggs + cheese.'},lazut:{n:'Lazut (breakfast with Sera view) 🍳',d:'🍳 A natural “serpme” breakfast overlooking Sera Lake and the sea (Yıldızlı/Akçaabat) — good for families, halal. For GF: kuymak (confirm) + eggs + veg.'},baliklama:{n:'Balıklama Balık Lokantası',d:'🐟 Fresh fish, fish soup and anchovy at reasonable prices with generous portions (İskenderpaşa near the center) — halal & <b>alcohol-free</b> (described as a family, no-alcohol spot). 8am–12am. ⚠️ It’s a small (salaş) place — <b>hard to seat all 19 at once</b>, call ahead. For GF: grilled (avoid fried).'},sofiagarden:{n:'Sofia Garden Cafe & Brasserie',d:'🥗 A world-cuisine brasserie near the Hagia Sophia museum (Fatih) — salads and lighter dishes, good after visiting Hagia Sophia. Halal (confirm alcohol). Safer GF options.'},torulcam:{n:'Torul Glass Terrace 🌉',d:'🌉 A glass platform 240 m above the valley (holds 50) beside historic Torul Castle — adrenaline and surreal views. Gümüşhane ~85 km on the Zigana road, ~80₺, free parking and a kids play area. A great stop on your Sumela/Zigana day. ⚠️ Not for those afraid of heights.'},trabzoncastle:{n:'Trabzon Castle (Trabzon Kalesi)',d:'🏰 Historic walls and towers (Roman/Byzantine/Ottoman) overlooking the city, next to Zağnos Valley downtown. Open ruins, free. ⚠️ Uneven ground — the park is easier for kids. Combine with Zağnos Valley.'},kizlar:{n:'Kızlar (Virgins) Monastery',d:'⛪ A rock-carved monastery near Boztepe (Panagia Theoskepastos) overlooking the city — historic and quiet. ~60₺, open 6 days except Monday 9am–5pm (museum card not accepted). Combine with Boztepe.'},trabzonmuseum:{n:'Trabzon Museum (Kostaki Mansion)',d:'🏛️ An elegant historic Italian-style mansion (Kostaki) — <b>reopened May 2025</b> after a long restoration. Regional artifacts, ethnography and 19th-century atmosphere, downtown (Zeytinlik). A short visit good for older kids and the elderly — indoor and cool in the heat.'},gulbahar:{n:'Gülbahar Hatun Mosque',d:'🕌 A historic Ottoman mosque (built by Sultan Selim for his mother Gülbahar Hatun) downtown near Zağnos Valley. Lovely to pray and visit, near the castle.'},camburnu:{n:'Çamburnu Forest & Beach 🌲',d:'🌲 Rare: red pines that run right down to sea level — beach + forest together! Sürmene ~48 km east on the coast road, family-friendly and easy. ⚠️ Had a past fire but still worth it. Calm and away from the crowds.'},kudavas:{n:'Kudavas Waterfall 💦',d:'💦 A “hidden paradise” in Tonya — a natural pool and rock slide, nice for photos and a walk. ⚠️ Better for a small active group; the road is rural. Away from the crowds.'},gulderen:{n:'Gülderen Waterfall 💧',d:'💧 A tiered waterfall in the forest on the Salmata river (Hayrat) — relatively easy access from Of/Hayrat. Pretty and quiet, recently popular. ⚠️ Far east (Rize border).'},orumcek:{n:'Örümcek Forests 🌲',d:'🌲 Home to <b>Europe’s tallest fir (61.5 m)</b> and ~450-year-old trees, a nature reserve. Kürtün/Gümüşhane, free entry. ⚠️⚠️ Very far (a full-day trip) and the last stretch is dirt road — for pristine-nature lovers only.'},solma:{n:'Şolma Yayla 🏞️',d:'🏞️ The “quietest yayla” on the Black Sea (Maçka ~22–50 km) — rich in mountain flowers with safe camping areas. For those who want calm away from the crowds. ⚠️ Part of the road is rough.'},ortamahalle:{n:'Akçaabat Ortamahalle (Ottoman quarter) 🏘️',d:'🏘️ An Ottoman quarter with stone slopes, restored mansions and the San Michael church (museum) — a protected heritage area. Akçaabat ~13 km west. ⚠️ Steep slopes — watch kids and the elderly.'},vazelon:{n:'Vazelon Monastery ⛪',d:'⛪ Older than Sumela, an abandoned monastery in a pine forest — a solitary “discovery” experience (Maçka ~40 km). ⚠️⚠️ The last stretch is dirt road with a walk and no transport — <b>for a small adult group with a 4x4 only</b>, not for kids or the elderly.'},santa:{n:'Santa Ruins 🏚️',d:'🏚️ An abandoned Greek stone village (300+ houses and churches) since 1923, in a green valley. ⚠️⚠️ Part of the road is rough dirt — <b>for a small adult group only</b>, avoid in rain.'},ayder:{n:'Ayder Yayla ☁️',d:'☁️ One of Turkey’s most beautiful plateaus — hot springs, the Bride’s Veil waterfall, wooden houses and magical mist. ⚠️⚠️ Very far (in Rize ~2.5–3 h), Kaçkar park entry ~195₺/car, a long day and changeable weather (take jackets and an umbrella). For an active family.'},firtina:{n:'Fırtına Valley + Zilkale Castle 🏰',d:'🏰 A dramatic green valley with a roaring river and Ottoman bridges, plus 14th-century Zilkale castle on a 750 m cliff — stunning views. ⚠️ In Rize ~2–2.5 h, the road is narrow and winding with a dirt last stretch + a 15-min walk to the castle. For an active family; rafting for adults.'},karacacave:{n:'Karaca Cave 🕳️',d:'🕳️ A stunning cave with stalactites, stalagmites and limestone pools at ~1,550 m (Gümüşhane ~100 km) — combine it with Torul terrace in one day. ~100₺. ⚠️ Has stairs and is damp, and it’s a long full-day trip for young kids.'},forum:{n:'Forum Trabzon AVM',d:'The biggest and cleanest mall around (4.2★ · 23k) — Turkish and global brands, an 8-screen cinema, <b>the region’s only bowling</b>, an ice rink, a kids play area, a sea-view food court, and a Migros with a gluten-free shelf. <b>Parking for 1,716 cars</b> (ideal for vans). ☎️ 0462 377 02 00. ⚠️ Not cheap even on sale, and food-court AC can be weak in the heat.'},bedesten:{n:'Bedesten (covered bazaar)',d:'🎁 A historic 16th-century Ottoman bazaar downtown — gifts, local products, handicrafts and copperware. Bargaining is fine. Combine it with the adjacent coppersmiths market.'},uzunsokak:{n:'Uzun Sokak (pedestrian street) 🚶',d:'🚶 The main pedestrian street (~700 m) downtown — clothes, cafes, sweets and gifts, a lively vibe. Closed to cars in 2008. The nicest shopping stroll near the hotel.'},kemeralti:{n:'Kemeraltı / Coppersmiths (Bakırcılar) 🔨',d:'🔨 The historic coppersmiths market next to Bedesten — copper pitchers, trays and teapots, with cobblestone atmosphere. Bargaining encouraged. Authentic gifts, and a Bakırcı Baba shop for the master craftsmen.'},semerciler:{n:'Semerciler Street (spices & fabrics)',d:'🧵 Fabrics, tailors, herbalists, spices and crafts — for nostalgic shopping downtown. Good for local nuts and spices.'},ruspazar:{n:'Russian Bazaar (Rus Pazarı / Avrasya)',d:'🛍️ A flea/second-hand market — clothes and household goods at low prices, bargaining essential. ⚠️ <b>Confirm it’s still open before you go</b> (there were earlier redevelopment/demolition plans).'},kazazi:{n:'Kazaziye / Trabzon Hasırı jewelry 💫',d:'💫 A craft of weaving very fine gold/silver threads by needle, with a registered geographical indication — bracelets, necklaces and 925-silver prayer beads. Kale Kuyumculuk in Alipaşa Çarşısı inside Kunduracılar. An authentic, distinctive Trabzon gift.'},sumela:{n:'Sumela Monastery (day trip)',d:'A Byzantine monastery clinging to the cliff, ~45–50 km / 1 h south. Foreigner entry ~€20, open daily 8am–7pm (last ticket 6:30pm). <b>Private cars not allowed</b> — park down in the valley (~120₺) then a mandatory shuttle (~50–140₺/person) + a 350 m forest path and stairs. ⚠️ Steep stairs, not for the very elderly/strollers; doable for the 6- and 11-year-olds. Go in the morning (8am) to beat crowds and heat. Dress modestly. Carry cash.'},kosk:{n:'Atatürk Köşkü + park',d:'🏛️ An elegant white mansion in a pine forest with a garden and pond, sea view — a family picnic. Summer 8am–7pm, symbolic entry ~85₺ (museum card may not be accepted). ⚠️ Some stairs inside; the garden is easy for kids.'},boztepeteras:{n:'Boztepe Terrace (Volkan Konak) 🏔️',d:'⭐ A panoramic lookout over Trabzon and the Black Sea (4.5★) — wooden walkways, a small glass bridge and cafes. Easy and close (~5 min), best at <b>sunset (~7:45pm in July)</b> and for city lights. ⚠️ General entry is now paid (~60₺ citizen/120₺ foreigner per 2025 reports; glass terrace ~20₺) — confirm on arrival. Best for the family.'},sera:{n:'Sera Lake (nature park)',d:'🏞️ The city’s nearest natural escape (~12 km / 20 min) — a calm tree-lined lake, pedal boats kids adore, playgrounds, restaurants, a mosque and parking. A nature park, entry ~60₺/person (reduced 30₺) + a small car fee, open 8am–8pm. Ideal for an easy half-day with family. ⚠️ Crowded on weekends — go in the morning.'},uzungol:{n:'Uzungöl (day trip)',d:'A beautiful mountain lake, ~95–99 km / 1.5 h. Nature-park entry ~60₺/person, the upper viewing terrace is free, parking ~20–30₺. ⚠️⚠️ It has become commercial and a tourist trap — very overpriced shops and restaurants; if you go: arrive early (before the crowds) or in the afternoon for parking, and eat before/after, not at the lakeside. The lakeside walk is easy for kids and the elderly.'},mymandolin:{n:'My Mandolin Cafe & Bakery',d:'☕ A new cafe/bakery on Uzun Sokak downtown (opened 2025) — coffee, toast and desserts. Close to the hotel and good for a small/medium group, halal. ⚠️ New and social-media-sourced — confirm it’s open before you go.'},ficafe:{n:'Fi Cafe (with a view)',d:'☕ A new cafe/breakfast spot with a view (opened 2025) in central Trabzon — a nice vibe for families, halal. ⚠️ New and social-media-sourced — confirm it’s open and its exact location before you go.'},cinaralti:{n:'Çınaraltı (best for groups) 🍽️',d:'🍽️ <b>The best fit for 19!</b> Akçaabat köfte, hamsili pilav and fish on the central seafront — the owner says: “we serve <b>1,200 people</b> across summer and winter halls.” Sea view, fast service, reasonable prices, halal & alcohol-free, kid-friendly. Booking recommended at peak. For GF: grilled.'},hanife:{n:'Hanife Hatun Mosque (largest) 🕌',d:'🕌 <b>The largest mosque in the Eastern Black Sea</b> — opened July 2025 on the coast (Pazarkapı). Holds 7,700 inside and ~15,000 with the courtyards, a 42 m dome and 4 minarets (~77 m), with a library and hall. A new landmark for prayer and family visits, next to the Pazarkapı area and the science center.'},cafejoy:{n:'Cafejoy Tostospark 🎈',d:'🎈 A cafe-restaurant with a <b>play area and ball pit</b> for little kids (Kaşüstü) — perfect for the family to sit and eat while the little ones play safely. Halal. New & popular (2025).'},lordly:{n:'LORDLY Coffee (Beşirli)',d:'☕ A stylishly designed cafe that opened late 2025 in Beşirli — a trendy new meeting point, comfortable for family sit-downs, halal. ⚠️ New and social-media-sourced — confirm hours before you go.'},cerramicca:{n:'Cerramicca Cafe (ceramics)',d:'☕ A cafe with a distinctive vibe and handmade ceramics (Ortahisar, near Ercan Burger), new in 2025 — nice for kids and family, hot chocolate ~180₺. Halal. ⚠️ Gluten status unconfirmed — ask.'},cilekli:{n:'Strawberry Dreams Village 🍓',d:'🍓 A <b>free educational</b> kids center (science, design and cooking workshops) with outdoor spaces — opened December 2025. ⚠️ It mostly runs organized school visits — <b>confirm individual summer visits</b> before you go.'},pazarkapi:{n:'Pazarkapı Life Area 🌊',d:'🌊 A new coastal meeting area (a 237M₺ investment) — home to the “Avrasya Bazaar”, the science center, cafes and kiosks, connected to the new Hanife Hatun Mosque. A nice family stroll on the downtown seafront.'},esnaflok:{n:'Municipal Esnaf Lokantası 🍲',d:'🍲 <b>Budget find:</b> the Trabzon Metropolitan Municipality’s canteen-restaurant — right beside Hanife Hatun Mosque (east side, facing the Avrasya bazaar). Homestyle Turkish cooking at unreal prices: mains ~100–140₺, soup ~40₺, rice ~25₺, sütlaç ~40₺ (7/2025 prices — may have risen). Definitely halal. Ideal for a cheap quick lunch for 19 after visiting the mosque. For GF: ask for grilled/legume dishes.'}};
function fixEn(){try{const tag=(o)=>{if(o&&typeof o==='object'&&('ar'in o||'tr'in o)&&!('en'in o)){o.en=o.tr||o.ar;}};Object.values(CATS).forEach(tag);Object.values(GF).forEach(tag);Object.values(PR).forEach(tag);tag(ALMONDNOTE);PLACES.forEach(p=>{tag(p.src);if(p.mall){tag(p.mall);tag(p.mall.kids);tag(p.mall.couples);tag(p.mall.coffee);}var e=(typeof ENP!=='undefined')?ENP[p.id]:null;var base=p.tr||p.ar||{};p.en={n:(e&&e.n)||base.n,d:(e&&e.d)||base.d};});DAYS.forEach(d=>{tag(d.d);tag(d.t);tag(d.tip);tag(d.mens);if(d.plan){}});if(typeof PHRASES!=='undefined')PHRASES.forEach(tag);}catch(e){}}

function placeCard(p){const cat=CATS[p.c],gf=GF[p.gf||'na'],pr=PR[p.pr];const stars=p.r?`<span class="rate">★ ${p.r}${p.rc?' ('+p.rc+')':''}</span>`:'';const visited=VISITED[p.id];

  const gfBadge=(p.gf&&p.gf!=='na')?`<span class="pill" style="background:${gf.col}22;color:${gf.col}">${gf[LANG]}</span>`:'';
  const prBadge=pr?`<span class="pill" style="background:${pr.col}22;color:${pr.col}">${pr[LANG]}</span>`:'';

function gfProof(p){
  const ar=LANG==='ar',tr=LANG==='tr';
  const L=(a,t,e)=>ar?a:(tr?t:(e||t));
  const badge={high:{t:L('مصدر موثّق','Doğrulanmış','Verified'),c:'#1f7a5a',bg:'#e7f3ec',ic:'✅'},
    med:{t:L('تقارير ضيوف','Misafir yorumu','Guest reports'),c:'#b9791b',bg:'#fbf2e0',ic:'🟡'},
    low:{t:L('غير مؤكّد — اسألوا','Doğrulanmadı','Unverified — ask'),c:'#b3402f',bg:'#f7e7e3',ic:'⚠️'}};
  let lvl,txt;
  if(p.src){lvl=p.src.lvl;txt=ar?p.src.ar:(tr?p.src.tr:(p.src.en||p.src.tr));}
  else{
    if(p.gf==='yes'){lvl='high';txt=L('خيارات آمنة معروفة هنا.','Güvenli seçenekler var.','Known safe options here.');}
    else if(p.gf==='ok'){lvl='low';txt=L('خيارات عند الطلب فقط — غير مؤكّد للسيلياك، اسألوا الستاف وأكّدوا منع التلوّث.','Sadece sorunca — doğrulanmadı.','On request only — unverified for celiac; ask staff.');}
    else if(p.gf==='careful'){lvl='low';txt=L('ما في جلوتين-فري مخصّص؛ مشاوي طبيعية (ızgara) بحذر تلوّث فقط.','Özel glutensiz yok; sadece ızgara dikkatle.','No dedicated GF; only naturally grilled items, with care.');}
    else if(p.gf==='no'){lvl='low';txt=L('غير مناسب — قمح أساسي.','Uygun değil — buğday.','Not suitable — wheat-based.');}
    else return '';
  }
  const b=badge[lvl]||badge.low;
  return `<div class="gfproof" style="background:${b.bg};border-inline-start:4px solid ${b.c}"><div class="gfpb" style="color:${b.c}">${b.ic} ${L('الدليل والمصدر','Kaynak','Proof & source')}: ${b.t}</div><div class="gfpt">${txt}</div></div>`;
}

function pName(id){const r=ROSTER.find(x=>x.id===id);return r?r[LANG]:id;}
function pEm(id){const r=ROSTER.find(x=>x.id===id);return r?r.em:'';}
function fmtTL(n){n=Math.round((Number(n)||0)*100)/100;const v=n.toLocaleString('en-US',{maximumFractionDigits:2});return v+' ₺';}
function moneyPeople(){return ROSTER.slice();}
async function addBill(){
  if(!USER||USER.id!=='raya'){notify(LX('راية بس بتسجّل المصاريف','Sadece Raya','Only Raya logs expenses'));return;}
  const payer=document.getElementById('mPayer').value;
  const total=parseFloat(document.getElementById('mTotal').value||'0');
  const note=(document.getElementById('mNote').value||'').trim();
  if(!payer||!total||total<=0){notify(LX('حطّي مين دفع والمجموع','Ödeyen ve tutar lazım','Add who paid and the total'));return;}
  const shares={};let sum=0;
  moneyPeople().forEach(p=>{const el=document.getElementById('sh_'+p.id);const v=el?parseFloat(el.value||'0'):0;if(v&&v>0){shares[p.id]=Math.round(v*100)/100;sum+=v;}});
  if(sum<=0){notify(LX('وزّعي المبلغ على الناس','Kişilere dağıtın','Distribute the amount to people'));return;}
  if(Math.abs(sum-total)>0.5){const ok=confirm((LANG==='ar'?'الموزّع ('+fmtTL(sum)+') مش مساوي للمجموع ('+fmtTL(total)+'). تأكيد الحفظ؟':'Toplam uyuşmuyor. Kaydet?'));if(!ok)return;}
  EXPENSES.push({id:Date.now(),payer,total:Math.round(total*100)/100,note,shares});
  await sset('fambam:expenses',EXPENSES);
  notify(LX('✅ تمت إضافة الفاتورة','Eklendi','✅ Bill added'));
  renderMoney();
}
async function delBill(id){
  if(!USER||USER.id!=='raya')return;
  if(!confirm(LX('حذف الفاتورة؟','Sil?','Delete the bill?')))return;
  EXPENSES=EXPENSES.filter(b=>b.id!==id);
  await sset('fambam:expenses',EXPENSES);renderMoney();
}
function splitEqualAll(){
  const total=parseFloat(document.getElementById('mTotal').value||'0');const ppl=moneyPeople();
  if(!total||total<=0){notify(LX('حطّي المجموع أول','Önce tutar','Enter the total first'));return;}
  const each=Math.floor((total/ppl.length)*100)/100;let used=each*ppl.length;let rem=Math.round((total-used)*100)/100;
  ppl.forEach((p,i)=>{const el=document.getElementById('sh_'+p.id);if(el){el.value=(i===0?(each+rem):each).toFixed(2);}});
  updateRemain();
}
function clearShares(){moneyPeople().forEach(p=>{const el=document.getElementById('sh_'+p.id);if(el)el.value='';});updateRemain();}
function updateRemain(){
  const total=parseFloat(document.getElementById('mTotal').value||'0');let sum=0;
  moneyPeople().forEach(p=>{const el=document.getElementById('sh_'+p.id);if(el){const v=parseFloat(el.value||'0');if(v)sum+=v;}});
  const rem=Math.round((total-sum)*100)/100;const el=document.getElementById('mRemain');
  if(el){el.innerHTML=(LX('موزّع: ','Dağıtılan: ','Allocated: '))+'<b>'+fmtTL(sum)+'</b> · '+(LX('باقي: ','Kalan: ','Remaining: '))+'<b style="color:'+(Math.abs(rem)<0.5?'#1f7a5a':(rem<0?'#b3402f':'#c97a16'))+'">'+fmtTL(rem)+'</b>';}
}
function computeSettle(){
  const paid={},owed={};moneyPeople().forEach(p=>{paid[p.id]=0;owed[p.id]=0;});
  EXPENSES.forEach(b=>{paid[b.payer]=(paid[b.payer]||0)+b.total;for(const k in b.shares){owed[k]=(owed[k]||0)+b.shares[k];}});
  const bal={};moneyPeople().forEach(p=>{bal[p.id]=Math.round((paid[p.id]-owed[p.id])*100)/100;});
  // min transactions greedy
  const cred=[],deb=[];for(const id in bal){const v=bal[id];if(v>0.009)cred.push({id,v});else if(v<-0.009)deb.push({id,v:-v});}
  cred.sort((a,b)=>b.v-a.v);deb.sort((a,b)=>b.v-a.v);
  const tx=[];let i=0,j=0;let g=0;
  while(i<deb.length&&j<cred.length&&g<200){g++;const m=Math.round(Math.min(deb[i].v,cred[j].v)*100)/100;if(m>0)tx.push({from:deb[i].id,to:cred[j].id,amt:m});deb[i].v=Math.round((deb[i].v-m)*100)/100;cred[j].v=Math.round((cred[j].v-m)*100)/100;if(deb[i].v<=0.009)i++;if(cred[j].v<=0.009)j++;}
  return {paid,owed,bal,tx};
}

function getFBR(){try{const r=JSON.parse(localStorage.getItem('fbRate')||'null');if(r&&r.try)return r;}catch(e){}return {try:46.7,eur:53,jod:65.9,ts:0};}
function paintRate(){const r=getFBR();const e1=document.getElementById('rUsd');if(!e1)return;
  e1.textContent=r.try.toFixed(2);const e2=document.getElementById('rEur');if(e2)e2.textContent=r.eur.toFixed(1);
  const e3=document.getElementById('rJod');if(e3)e3.textContent=r.jod.toFixed(1);
  const ts=document.getElementById('rateTs');
  if(ts)ts.textContent=r.ts?(LX('آخر تحديث لايف: ','Son canlı güncelleme: ','Last live update: ')+new Date(r.ts).toLocaleString(LANG==='ar'?'ar-JO':(LANG==='tr'?'tr-TR':'en-GB'),{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'})):LX('سعر مرجعي (٣ تموز) — اكبس تحديث للسعر اللحظي','Referans kur — canlı için güncelle','Reference rate — tap update for live');}
async function updateRate(){const btn=document.getElementById('rateBtn');if(btn){btn.disabled=true;btn.textContent='⏳ '+LX('عم أجيب السعر…','Kur alınıyor…','Fetching…');}
  let ok=false;
  try{const d=await (await fetch('https://open.er-api.com/v6/latest/USD',{cache:'no-store'})).json();
    if(d&&d.rates&&d.rates.TRY){const t=d.rates.TRY;const r={try:t,eur:d.rates.EUR?t/d.rates.EUR:t/0.88,jod:d.rates.JOD?t/d.rates.JOD:t/0.709,ts:Date.now()};localStorage.setItem('fbRate',JSON.stringify(r));ok=true;}}catch(e){}
  if(!ok){try{const d=await (await fetch('https://api.frankfurter.app/latest?from=USD&to=TRY,EUR',{cache:'no-store'})).json();
    if(d&&d.rates&&d.rates.TRY){const t=d.rates.TRY;const r={try:t,eur:d.rates.EUR?t/d.rates.EUR:t/0.88,jod:t/0.709,ts:Date.now()};localStorage.setItem('fbRate',JSON.stringify(r));ok=true;}}catch(e){}}
  paintRate();cnv(document.getElementById('cUsd')&&document.getElementById('cUsd').value?'u':'t');
  if(btn){btn.disabled=false;btn.textContent='🔄 '+LX('حدّث السعر (لايف)','Kuru güncelle (canlı)','Update rate (live)');}
  notify(ok?LX('✅ انجاب السعر اللحظي!','✅ Canlı kur alındı!','✅ Live rate fetched!'):LX('⚠️ ما في نت — عارض آخر سعر محفوظ','⚠️ İnternet yok — son kayıtlı kur','⚠️ Offline — showing last saved rate'));}
function cnv(src){const r=getFBR();const u=document.getElementById('cUsd'),t=document.getElementById('cTry');if(!u||!t)return;
  const norm=v=>parseFloat(String(v).replace(/[٠-٩]/g,d=>'0123456789'['٠١٢٣٤٥٦٧٨٩'.indexOf(d)]).replace(/,/g,'.'))||0;
  if(src==='u'){const v=norm(u.value);t.value=v?(v*r.try).toFixed(0):'';}
  else{const v=norm(t.value);u.value=v?(v/r.try).toFixed(2):'';}}

function escCh(t){return String(t).replace(/[<>&"]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c]));}
function renderChat(){const box=document.getElementById('chatmsgs');if(!box)return;

async function loadChat(silent){if(chatBusy)return;chatBusy=true;
  try{const prevLast=CHAT.length?CHAT[CHAT.length-1].ts:0;
    const arr=await sget('chat');if(Array.isArray(arr))CHAT=arr;
    renderChat();updateChatBadge();
    const news=CHAT.filter(m=>m.ts>prevLast&&(!USER||m.uid!==USER.id));
    if(!silent&&prevLast>0&&news.length){const last=news[news.length-1];
      const onHome=document.getElementById('s-map')&&document.getElementById('s-map').classList.contains('show');
      if(document.hidden){fireNotif(last);}
      else if(!onHome){notify('💬 '+(last.nm||'')+': '+last.txt.slice(0,60));}
      else{markChatSeen();}
    }
  }catch(e){}chatBusy=false;}
async function sendChat(txt){if(!USER){notify(LX('سجّل دخول أول 😊','Önce giriş yap','Log in first'));return;}
  txt=String(txt||'').trim();if(!txt)return;
  const nm=USER.tronly?'Sibel':(LANG==='ar'?USER.ar:USER.tr);
  const msg={id:Date.now()+'-'+Math.random().toString(36).slice(2,6),uid:USER.id,nm,em:USER.em,txt:txt.slice(0,200),ts:Date.now()};
  try{const cur=await sget('chat');const arr=Array.isArray(cur)?cur:[];
    arr.push(msg);arr.sort((a,b)=>a.ts-b.ts);const trimmed=arr.slice(-150);
    await sset('chat',trimmed);CHAT=trimmed;renderChat();markChatSeen();
  }catch(e){notify('⚠️ '+LX('ما انبعتت — جرّب ثاني','Gönderilemedi','Failed — try again'));}}
function sendChatInput(){const el=document.getElementById('chatin');if(!el)return;const v=el.value;el.value='';sendChat(v);}
function startChatLoop(){if(chatTimer)clearInterval(chatTimer);loadChat(true);chatTimer=setInterval(()=>loadChat(false),10000);}

async function createPoll(){if(!USER||!USER.admin)return;const q=document.getElementById('pq').value.trim();const opts=[0,1,2,3].map(i=>document.getElementById('po'+i).value.trim()).filter(Boolean);if(!q||opts.length<2){alert(LX('سؤال + خيارين','Soru+2','Question + 2 options'));return;}POLL={id:Date.now(),q,opts,closed:false};VOTES={};seenPollId=POLL.id;seenClosed[POLL.id]=false;await sset('fambam:poll',POLL);await sset('fambam:votes',VOTES);renderVote();renderHomeVote();confetti();notify(LX('تصويت جديد! 🗳️','Yeni oylama!','New vote! 🗳️'));}
async function vote(i){if(!POLL||POLL.closed||!USER)return;VOTES=(await sget('fambam:votes'))||{};VOTES[USER.id]=i;await sset('fambam:votes',VOTES);renderVote();renderHomeVote();notify(LX('سجّلنا صوتك ✅','Oyun kaydedildi','Your vote is saved ✅'));}
async function sendVoteReq(){if(!USER)return;const q=document.getElementById('vreq').value.trim();if(!q){alert(LX('اكتب السؤال','Yaz','Type the question'));return;}VREQS=(await sget('fambam:votereqs'))||[];const nm=USER.tronly?'Sibel':(LANG==='ar'?USER.ar:USER.tr);VREQS.push({em:USER.em,nm,q,ts:Date.now()});seenVReqN=VREQS.length;await sset('fambam:votereqs',VREQS);notify(LX('وصل طلبك لحمزة 📨','Gönderildi','Your request reached Hamza 📨'));renderVote();}
async function useVoteReq(i){if(!USER||!USER.admin)return;VREQS=(await sget('fambam:votereqs'))||[];const r=VREQS[i];if(!r)return;const pq=document.getElementById('pq');if(pq){pq.value=r.q;pq.scrollIntoView({behavior:'smooth',block:'center'});}VREQS.splice(i,1);await sset('fambam:votereqs',VREQS);renderVote();}
async function closePoll(){if(!USER||!USER.admin||!POLL)return;POLL.closed=true;seenClosed[POLL.id]=true;await sset('fambam:poll',POLL);renderVote();renderHomeVote();confetti(true);notify(LX('انتهى التصويت — شوفوا النتيجة 🏆','Sonuçlar 🏆','Voting ended — see the result 🏆'));}
async function openWnr(){if(!USER||!USER.admin)return;const q=document.getElementById('wq').value.trim();if(!q){alert(LX('اكتب سؤال','Soru','Type a question'));return;}WNR={id:Date.now(),q,revealed:false};WANS={};await sset('fambam:wnr',WNR);await sset('fambam:wans',WANS);renderVote();}
async function submitWnr(){if(!WNR||WNR.revealed||!USER)return;const t=document.getElementById('wans').value.trim();if(!t)return;WANS=(await sget('fambam:wans'))||{};VREQS=(await sget('fambam:votereqs'))||[];INDIRIM=(await sget('fambam:indirim'))||{};const nm=USER.tronly?'Sibel':(LANG==='ar'?USER.ar:USER.tr);WANS[USER.id]={nm,em:USER.em,text:t};await sset('fambam:wans',WANS);renderVote();confetti(true);}
async function revealWnr(){if(!USER||!USER.admin||!WNR)return;WNR.revealed=true;await sset('fambam:wnr',WNR);renderVote();confetti();}

function knowRandom(){
  const cards=[...document.querySelectorAll('#s-know .knowc')];
  if(!cards.length)return;
  const c=cards[Math.floor(Math.random()*cards.length)];
  c.scrollIntoView({behavior:'smooth',block:'center'});
  cards.forEach(x=>x.classList.remove('kpulse'));
  setTimeout(()=>{c.classList.add('kpulse');setTimeout(()=>c.classList.remove('kpulse'),1600);},450);
}

  const jump=`<div class="knowjump">${order.map(g=>`<button class="kchip" onclick="document.getElementById('kg-${g}').scrollIntoView({behavior:'smooth',block:'start'})">${KNOWG[g][LANG]||KNOWG[g].tr}</button>`).join('')}</div>`;
  let html=hero+jump;

    html+=`<h3 class="knowgh" id="kg-${g}">${KNOWG[g][LANG]||KNOWG[g].tr} <span class="kgn">${items.length}</span></h3><div class="knowgrid">`;
    items.forEach(k=>{
      html+=`<div class="knowc"><div class="kc-top"><span class="kc-em">${k.em}</span><b>${k.t[li]}</b></div><p>${k.d[li]}</p></div>`;
    });

  });
  html+=`<div class="knowfoot">🌊 ${LX('طرابزون تنطركم!','Trabzon sizi bekliyor!','Trabzon awaits you!')} 🎉</div>`;

function sortPlaces(arr){
  if(window._myloc){return arr.slice().sort((a,b)=>{const da=distKm(a.lat,a.lng),db=distKm(b.lat,b.lng);return (da==null?9e9:da)-(db==null?9e9:db);});}
