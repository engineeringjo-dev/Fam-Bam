const TRABZON_BBOX={latMin:40.50,latMax:41.25,lngMin:38.85,lngMax:40.45};
function inTrabzon(lat,lng){const b=TRABZON_BBOX;return lat>=b.latMin&&lat<=b.latMax&&lng>=b.lngMin&&lng<=b.lngMax;}
function kmHotel(lat,lng){const R=6371,toR=x=>x*Math.PI/180;const dLat=toR(lat-ZORLU[0]),dLng=toR(lng-ZORLU[1]);const a=Math.sin(dLat/2)**2+Math.cos(toR(ZORLU[0]))*Math.cos(toR(lat))*Math.sin(dLng/2)**2;return 2*R*Math.asin(Math.sqrt(a));}
function norm(x){return (x||'').toString().toLocaleLowerCase('tr').replace(/[İI]/g,'i').replace(/[\u064B-\u0652]/g,'').trim();}
function placeNames(p){return [p.ar&&p.ar.n,p.tr&&p.tr.n,p.en&&p.en.n].filter(Boolean);}

  const hits=PLACES.filter(p=>p.id!=='zorlu'&&placeNames(p).some(n=>norm(n).includes(q))).slice(0,15);
  box.classList.add('on');
  if(!hits.length){box.innerHTML=`<div class="srnone">${LX('ما لقيت محل بهالاسم. جرّب جزء من الاسم بالتركي/الإنجليزي.','Bulunamadı.','No place by that name — try part of the Turkish/English name.')}</div>`;return;}
  box.innerHTML=hits.map(p=>{
    const cat=CATS[p.c];const nm=p[LANG]&&p[LANG].n?p[LANG].n:(p.tr&&p.tr.n||p.ar&&p.ar.n);
    const ok=inTrabzon(p.lat,p.lng);const d=kmHotel(p.lat,p.lng);
    const dtxt=d<1?`≈ ${Math.round(d*1000)} ${ar?'م':'m'}`:`≈ ${d.toFixed(1)} ${ar?'كم':'km'}`;
    const loc=ok
      ?`<span class="srok">✅ ${LX('داخل طرابزون','Trabzon içi','In Trabzon')} · ${LX('بُعد عن الفندق','otelden','from hotel')} ${dtxt}</span>`
      :`<span class="srbad">⚠️ ${LX('خارج حدود طرابزون','Trabzon dışı','Outside Trabzon')} (${dtxt})</span>`;
    const onsale=INDIRIM[p.id];
    const disc=onsale
      ?`<span class="srsale">${INDIRIM_LOGO_SM} ${LX('عليه خصم — مسجّل عندكم','İndirim var','Discount — logged by you')}</span>`
      :`<button class="srchk" onclick="checkDiscount('${p.id}')">🔎 ${LX('تأكّد من عروض هالمحل','İndirim kontrol','Check this place for offers')}</button>`;
    const gq=encodeURIComponent((p.tr&&p.tr.n||p.ar&&p.ar.n||'')+' Trabzon');
    return `<div class="srrow"><div class="srh">${cat.em} <b>${nm}</b> ${p.r?`<span class="srstar">★ ${p.r}</span>`:''}</div>
      <div class="srmeta">${loc}</div>
      <div class="srmeta">${disc}</div>
      <div class="srbtns"><button class="lnk gold sm" onclick="searchToMap(${p.lat},${p.lng})">📍 ${LX('على الخريطة','Haritada','On map')}</button>
      <a class="lnk sm" href="${gmapUrl(p)}" target="_blank">🧭 ${LX('جوجل مابس','Google','Google Maps')}</a></div></div>`;
  }).join('');
}
function searchToMap(lat,lng){try{if(!map)initMap();map.setView([lat,lng],17);}catch(e){}document.getElementById('map').scrollIntoView({behavior:'smooth',block:'center'});}
function checkDiscount(id){
  const p=PLACES.find(x=>x.id===id);if(!p)return;
  const ar=LANG==='ar';
  const nm=(p.tr&&p.tr.n)||(p.ar&&p.ar.n)||'';
  const q=encodeURIComponent(nm+' Trabzon indirim kampanya');
  // honest: we can't auto-confirm; open a real Google search for this shop's offers
  if(USER&&USER.admin){
    if(confirm(LX('بدّك تسجّل إنّ هالمحل عليه خصم؟ (منيح إذا تأكّدت بنفسك)\n\nاضغط OK = سجّل خصم · Cancel = افتح بحث جوجل عن عروضه','İndirim olarak işaretle? OK=işaretle, İptal=Google ara','Mark this place as on-discount? OK = mark it · Cancel = open a Google search for its offers'))){
      INDIRIM[id]=true;sset('fambam:indirim',INDIRIM).then(()=>{searchPlaces();notify(LX('🏷️ سجّلنا خصم على '+nm,'İşaretlendi','Marked as on-discount'));});
      return;
    }
  }
  window.open('https://www.google.com/search?q='+q,'_blank');
}

nclick="filterMap('mall')"><span class="fico">${svgIco('mall',15)}</span> ${LX('مولات','AVM','Malls')}</button><button class="mt" data-f="brands" onclick="filterMap('brands')"><span class="fico">${svgIco('brand',15)}</span> ${LX('تسوّق','Alışveriş','Shopping')}</button></div><div class="maptools" id="prrow"><button class="mt dah" data-f="dah" onclick="filterMap('dah')"><span class="fico">${svgIco('fine',14)}</span> ${LX('الفخمة','Lüks','Upscale')}</button><button class="mt mid" data-f="mid" onclick="filterMap('mid')"><span class="fico">${svgIco('smile',14)}</span> ${LX('المتوسطة','Orta','Mid-range')}</button><button class="mt kadih" data-f="kadih" onclick="filterMap('kadih')"><span class="fico">${svgIco('coins',14)}</span> ${LX('الاقتصادية','Ekonomik','Budget')}</button></div><div id="map"></div><div id="homelist" class="homelist"></div><div id="homevote" class="homevote"></div>`;renderHomeList(curFilter);renderHomeVote();}

/* confetti */
function confetti(small){const cv=document.getElementById('conf');cv.style.display='block';const ctx=cv.getContext('2d');cv.width=innerWidth;cv.height=innerHeight;const cols=['#dd9a2f','#2f7f70','#b5402f','#2e8b57','#7b4fc0','#f3c46b'];const N=small?40:120;let parts=[];for(let i=0;i<N;i++)parts.push({x:Math.random()*cv.width,y:-20-Math.random()*cv.height*.3,r:4+Math.random()*6,c:cols[i%cols.length],vy:2+Math.random()*4,vx:-2+Math.random()*4,a:Math.random()*6});let t=0;(function fr(){ctx.clearRect(0,0,cv.width,cv.height);t++;parts.forEach(p=>{p.y+=p.vy;p.x+=p.vx;p.a+=.1;ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.a);ctx.fillStyle=p.c;ctx.fillRect(-p.r/2,-p.r/2,p.r,p.r*.6);ctx.restore();});if(t<110)requestAnimationFrame(fr);else cv.style.display='none';})();}
addEventListener('resize',()=>{const cv=document.getElementById('conf');cv.width=innerWidth;cv.height=innerHeight;});
