/* storage (Supabase → window.storage → in-memory) */
const HAS_STORE=(typeof window!=='undefined'&&window.storage&&typeof window.storage.get==='function');
const LOCPFX='fambam:loc:';
const mem={};
async function sget(k){
  if(SB){try{
    if(k.startsWith(LOCPFX)){const id=k.slice(LOCPFX.length);const{data}=await SB.from('fb_locations').select('*').eq('room',ROOM).eq('id',id).maybeSingle();return data?{id:data.id,nm:data.nm,em:data.em,lat:data.lat,lng:data.lng,ts:data.ts}:null;}
    const{data}=await SB.from('fb_state').select('val').eq('room',ROOM).eq('k',k).maybeSingle();return data?data.val:null;
  }catch(e){return null;}}
  if(HAS_STORE){try{const r=await window.storage.get(k,true);return r?JSON.parse(r.value):null;}catch(e){return null;}}
  return mem[k]??null;}
async function sset(k,v){mem[k]=v;
  if(SB){try{
    if(k.startsWith(LOCPFX)){const id=k.slice(LOCPFX.length);if(v===null){await SB.from('fb_locations').delete().eq('room',ROOM).eq('id',id);}else{await SB.from('fb_locations').upsert({room:ROOM,id,nm:v.nm,em:v.em,lat:v.lat,lng:v.lng,ts:v.ts});}return;}
    await SB.from('fb_state').upsert({room:ROOM,k,val:v});return;
  }catch(e){}}
  if(HAS_STORE){try{await window.storage.set(k,JSON.stringify(v),true);}catch(e){}}}
async function slist(p){
  if(SB){try{
    if(p===LOCPFX){const{data}=await SB.from('fb_locations').select('id').eq('room',ROOM);return (data||[]).map(r=>LOCPFX+r.id);}
    const{data}=await SB.from('fb_state').select('k').eq('room',ROOM).like('k',p+'%');return (data||[]).map(r=>r.k);
  }catch(e){return [];}}
  if(HAS_STORE){try{const r=await window.storage.list(p,true);return (r&&r.keys)?r.keys:[];}catch(e){return [];}}
  return Object.keys(mem).filter(k=>k.startsWith(p));}

/* prayer times */
const DEG=Math.PI/180;
function sinD(x){return Math.sin(x*DEG)}function cosD(x){return Math.cos(x*DEG)}function tanD(x){return Math.tan(x*DEG)}
function asinD(x){return Math.asin(x)/DEG}function acosD(x){return Math.acos(x)/DEG}function atan2D(y,x){return Math.atan2(y,x)/DEG}
function fixA(a){a=a%360;return a<0?a+360:a}function fixH(h){h=h%24;return h<0?h+24:h}
function jdate(y,m,d){if(m<=2){y--;m+=12;}const A=Math.floor(y/100),B=2-A+Math.floor(A/4);return Math.floor(365.25*(y+4716))+Math.floor(30.6001*(m+1))+d+B-1524.5;}
function sunPos(jd){const D=jd-2451545.0;const g=fixA(357.529+0.98560028*D),q=fixA(280.459+0.98564736*D);const L=fixA(q+1.915*sinD(g)+0.020*sinD(2*g)),e=23.439-0.00000036*D;const RA=fixH(atan2D(cosD(e)*sinD(L),cosD(L))/15);return {decl:asinD(sinD(e)*sinD(L)),eqt:q/15-RA};}
function prayerTimes(y,m,d,lat,lng,tz){const jd=jdate(y,m,d)+(12-tz)/24;const sp=sunPos(jd);const decl=sp.decl;const noon=fixH(12+tz-lng/15-sp.eqt);function HA(alt){let c=(sinD(alt)-sinD(lat)*sinD(decl))/(cosD(lat)*cosD(decl));c=Math.max(-1,Math.min(1,c));return acosD(c)/15;}const asrAlt=atan2D(1,1+tanD(Math.abs(lat-decl)));return {fajr:fixH(noon-HA(-18)),sunrise:fixH(noon-HA(-0.833)),dhuhr:fixH(noon+0.0167),asr:fixH(noon+HA(asrAlt)),maghrib:fixH(noon+HA(-0.833)),isha:fixH(noon+HA(-17))};}
function hm(h){let H=Math.floor(h),M=Math.round((h-H)*60);if(M===60){M=0;H++;}H=fixH(H);return (H<10?'0':'')+H+':'+(M<10?'0':'')+M;}

/* weather */
function wxEmoji(c){if(c===0)return '☀️';if(c<=2)return '🌤️';if(c===3)return '☁️';if(c<=48)return '🌫️';if(c<=67)return '🌧️';if(c<=77)return '🌨️';if(c<=82)return '🌦️';if(c<=99)return '⛈️';return '⛅';}
async function fetchWeather(){try{const r=await fetch('https://api.open-meteo.com/v1/forecast?latitude=41.0027&longitude=39.7168&current=temperature_2m,weather_code&daily=temperature_2m_max,temperature_2m_min,weather_code&timezone=auto&forecast_days=16');const j=await r.json();if(j.current)WX.now={t:Math.round(j.current.temperature_2m),c:j.current.weather_code};if(j.daily)j.daily.time.forEach((d,i)=>{WX.daily[d]={mx:Math.round(j.daily.temperature_2m_max[i]),mn:Math.round(j.daily.temperature_2m_min[i]),c:j.daily.weather_code[i]};});}catch(e){WX.fail=true;}updateDateWx();if(USER){renderDays();}}
function dayWx(dt){const key=`${dt.y}-${String(dt.m).padStart(2,'0')}-${String(dt.d).padStart(2,'0')}`;const w=WX.daily[key];if(w)return `${wxEmoji(w.c)} ${w.mn}°/${w.mx}°`;return LANG==='ar'?'🌤️ متوسط تموز ~٢٠°/٢٦° (رطب، زخّات محتملة)':'🌤️ Tem ort. ~20°/26°';}
function updateDateWx(){const d=new Date();let ds;try{ds=d.toLocaleDateString(LANG==='ar'?'ar-EG':'tr-TR',{weekday:'long',day:'numeric',month:'long'});}catch(e){ds=d.toDateString();}
  document.getElementById('dateTxt').textContent='📅 '+ds;
  const wxEl=document.getElementById('wxTxt');
  if(WX.now)wxEl.textContent=`${wxEmoji(WX.now.c)} ${WX.now.t}° ${LANG==='ar'?'طرابزون':'Trabzon'}`;
  else if(WX.fail)wxEl.textContent=LANG==='ar'?'🌤️ طرابزون ~٢٤°':'🌤️ Trabzon ~24°';}

let trVoice=null;
function loadVoices(){try{const vs=speechSynthesis.getVoices();trVoice=vs.find(v=>v.lang&&v.lang.toLowerCase().startsWith('tr'))||null;}catch(e){}}

function speak(txt){if(!('speechSynthesis' in window))return;speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(txt);u.lang='tr-TR';if(trVoice)u.voice=trVoice;u.rate=.9;speechSynthesis.speak(u);}

  else{const counts=POLL.opts.map((_,i)=>Object.values(VOTES).filter(v=>v===i).length);const total=counts.reduce((a,b)=>a+b,0);const max=Math.max(...counts,0);const my=USER?VOTES[USER.id]:undefined;html+=`<div class="card"><h3>❓ ${POLL.q}</h3><p style="font-size:.78rem;color:var(--muted)">👑 ${total} ${LANG==='ar'?'صوت':'oy'}${POLL.closed?' 🏆':''}</p>`;POLL.opts.forEach((o,i)=>{const pct=total?Math.round(counts[i]/total*100):0;const win=POLL.closed&&counts[i]===max&&max>0;if(POLL.closed||my!==undefined)html+=`<div class="bar ${win?'win':''}"><div class="bf" style="width:${pct}%"></div><div class="bt"><span>${o} ${win?'🏆':''} ${my===i?'✓':''}</span><span>${counts[i]} (${pct}%)</span></div></div>`;else html+=`<button class="votebtn ${my===i?'mine':''}" onclick="vote(${i})">${o}</button>`;});html+=`</div>`;}

async function createPoll(){if(!USER||!USER.admin)return;const q=document.getElementById('pq').value.trim();const opts=[0,1,2,3].map(i=>document.getElementById('po'+i).value.trim()).filter(Boolean);if(!q||opts.length<2){alert(LANG==='ar'?'سؤال + خيارين':'Soru+2');return;}POLL={id:Date.now(),q,opts,closed:false};VOTES={};await sset('fambam:poll',POLL);await sset('fambam:votes',VOTES);renderVote();confetti();}

async function openWnr(){if(!USER||!USER.admin)return;const q=document.getElementById('wq').value.trim();if(!q){alert(LANG==='ar'?'اكتب سؤال':'Soru');return;}WNR={id:Date.now(),q,revealed:false};WANS={};await sset('fambam:wnr',WNR);await sset('fambam:wans',WANS);renderVote();}
async function submitWnr(){if(!WNR||WNR.revealed||!USER)return;const t=document.getElementById('wans').value.trim();if(!t)return;WANS=(await sget('fambam:wans'))||{};const nm=USER.tronly?'Sibel':(LANG==='ar'?USER.ar:USER.tr);WANS[USER.id]={nm,em:USER.em,text:t};await sset('fambam:wans',WANS);renderVote();confetti(true);}

  document.getElementById('instModal').classList.add('show');}
function injectPWA(){try{const cv=document.createElement('canvas');cv.width=cv.height=512;const x=cv.getContext('2d');x.fillStyle='#0c4a57';x.fillRect(0,0,512,512);x.fillStyle='#e0a23a';x.textAlign='center';x.textBaseline='middle';x.font='bold 150px sans-serif';x.fillText('FB',256,210);x.font='120px serif';x.fillText('🐟',256,370);const icon=cv.toDataURL('image/png');const ap=document.createElement('link');ap.rel='apple-touch-icon';ap.href=icon;document.head.appendChild(ap);const man={name:'FAM BAM in TRABZAM',short_name:'FAM BAM',start_url:'.',display:'standalone',background_color:'#0c4a57',theme_color:'#0c4a57',icons:[{src:icon,sizes:'512x512',type:'image/png'}]};const url=URL.createObjectURL(new Blob([JSON.stringify(man)],{type:'application/json'}));const ml=document.createElement('link');ml.rel='manifest';ml.href=url;document.head.appendChild(ml);}catch(e){}}

/* ===== map ===== */
let map,markers=[],youMarker=null,youCircle=null,watchId=null,curFilter='all',memberMarkers={},shareUntil=0;
function initMap(){map=L.map('map',{zoomControl:true}).setView(ZORLU,14);const gRoad=L.tileLayer('https://{s}.google.com/vt/lyrs=m&x={x}&y={y}&z={z}',{subdomains:['mt0','mt1','mt2','mt3'],maxZoom:20,attribution:'Google'});const gSat=L.tileLayer('https://{s}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}',{subdomains:['mt0','mt1','mt2','mt3'],maxZoom:20,attribution:'Google'});const voy=L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',{maxZoom:20,attribution:'© CARTO'});gRoad.addTo(map);const bl={};bl[LANG==='ar'?'خرائط جوجل':'Google']=gRoad;bl[LANG==='ar'?'قمر صناعي':'Uydu']=gSat;bl[LANG==='ar'?'عادي':'Sade']=voy;L.control.layers(bl,null,{position:'topright'}).addTo(map);gRoad.on('tileerror',()=>{if(map.hasLayer(gRoad)){map.removeLayer(gRoad);voy.addTo(map);}});drawMarkers('all');}
function mkIcon(col,em){return L.divIcon({className:'',html:`<div style="background:${col};width:26px;height:26px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);border:2px solid #fff;box-shadow:0 2px 5px rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center"><span style="transform:rotate(45deg);font-size:13px">${em}</span></div>`,iconSize:[26,26],iconAnchor:[13,24],popupAnchor:[0,-22]});}
function mkMember(em){return L.divIcon({className:'',html:`<div style="background:#fff;width:30px;height:30px;border-radius:50%;border:3px solid #e0a23a;box-shadow:0 2px 6px rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;font-size:15px">${em}</div>`,iconSize:[30,30],iconAnchor:[15,15],popupAnchor:[0,-15]});}
function drawMarkers(filter){curFilter=filter;if(!map)return;markers.forEach(m=>map.removeLayer(m));markers=[];PLACES.forEach(p=>{let pass=filter==='all'||(filter==='food'&&(p.c==='food'||p.c==='gf'))||(filter==='gf'&&(p.gf==='yes'||p.gf==='ok'))||(filter==='kids'&&p.c==='kids')||(filter==='coffee'&&p.c==='coffee')||(filter==='mall'&&p.c==='mall')||(filter==='mosque'&&p.c==='mosque')||(['dah','mid','kadih'].includes(filter)&&p.pr===filter);if(!pass)return;const cat=CATS[p.c];const m=L.marker([p.lat,p.lng],{icon:mkIcon(cat.col,cat.em)}).addTo(map);const stars=p.r?`<span style="color:#b9821c;font-weight:700">★ ${p.r}</span>`:'';const gf=GF[p.gf||'na'];const pr=PR[p.pr];const gfTxt=(p.gf&&p.gf!=='na')?`<br><span style="font-size:11px;color:${gf.col};font-weight:700">${gf[LANG]}</span>`:'';const prTxt=pr?` <span style="font-size:11px;color:${pr.col};font-weight:700">${pr[LANG]}</span>`:'';const vTxt=VISITED[p.id]?`<br><span style="font-size:11px;color:#1d6b3e;font-weight:700">✓ ${LANG==='ar'?'زرناه':'Gittik'}</span>`:'';m.bindPopup(`<div style="font-family:Tajawal,sans-serif;direction:${LANG==='ar'?'rtl':'ltr'};text-align:${LANG==='ar'?'right':'left'};min-width:180px"><b style="font-size:14px">${p[LANG].n}</b> ${stars}${prTxt}${gfTxt}${vTxt}<br><span style="font-size:12px;color:#555">${p[LANG].d}</span><br><a href="${gmapUrl(p)}" target="_blank" style="font-size:12px;color:#1a73e8;font-weight:700">🧭 ${LANG==='ar'?'افتح بجوجل مابس':'Google Maps'}</a></div>`);markers.push(m);});}
function filterMap(f){drawMarkers(f);}
function recenter(){map&&map.setView(ZORLU,14);}
function locate(){const dot=document.getElementById('livedot'),txt=document.getElementById('livetext');if(!navigator.geolocation){txt.textContent=LANG==='ar'?'غير مدعوم':'Desteklenmiyor';return;}txt.textContent=LANG==='ar'?'جارٍ تحديد موقعكم…':'Konum…';if(watchId!==null)navigator.geolocation.clearWatch(watchId);watchId=navigator.geolocation.watchPosition(pos=>{const lat=pos.coords.latitude,lng=pos.coords.longitude,acc=pos.coords.accuracy||0;dot.classList.add('on');const rem=SHARING&&shareUntil?Math.max(0,Math.round((shareUntil-Date.now())/60000)):0;txt.innerHTML=LANG==='ar'?`📍 موقعكم مباشر ~${Math.round(acc)}م${SHARING?` · بتشاركوه 👥 (${rem}د)`:''}`:`📍 ~${Math.round(acc)}m${SHARING?` 👥 (${rem}m)`:''}`;if(!youMarker){youMarker=L.marker([lat,lng],{icon:mkIcon('#b5402f','🧍')}).addTo(map);youCircle=L.circle([lat,lng],{radius:acc,color:'#b5402f',fillColor:'#b5402f',fillOpacity:.12,weight:1}).addTo(map);}else{youMarker.setLatLng([lat,lng]);youCircle.setLatLng([lat,lng]).setRadius(acc);}window._myloc={lat,lng};if(SHARING)pushMyLoc();},err=>{dot.classList.remove('on');txt.textContent=LANG==='ar'?'فعّلوا صلاحية الموقع':'Konum izni';},{enableHighAccuracy:true,maximumAge:5000,timeout:12000});}
async function pushMyLoc(){if(!USER||!window._myloc)return;const nm=USER.tronly?'Sibel':(LANG==='ar'?USER.ar:USER.tr);await sset('fambam:loc:'+USER.id,{id:USER.id,nm,em:USER.em,lat:window._myloc.lat,lng:window._myloc.lng,ts:Date.now()});}
function toggleShare(){SHARING=!SHARING;const b=document.getElementById('sharebtn');if(SHARING){shareUntil=Date.now()+2*3600*1000;if(!watchId)locate();b.textContent=LANG==='ar'?'🛑 وقف':'🛑 Durdur';b.classList.add('share');pushMyLoc();shareTimer=setInterval(()=>{if(Date.now()>shareUntil){stopShare();return;}if(window._myloc)pushMyLoc();drawMembers();},15000);drawMembers();}else stopShare();}
function stopShare(){SHARING=false;shareUntil=0;if(shareTimer){clearInterval(shareTimer);shareTimer=null;}const b=document.getElementById('sharebtn');if(b){b.textContent=LANG==='ar'?'👥 شارك موقعي':'👥 Paylaş';b.classList.remove('share');}const tx=document.getElementById('livetext');if(tx&&window._myloc)tx.innerHTML=LANG==='ar'?'📍 موقعكم محدّد (مش مشترك)':'📍 Konum bulundu';if(USER)sset('fambam:loc:'+USER.id,null);}
async function drawMembers(){if(!map)return;const keys=await slist('fambam:loc:');const now=Date.now();for(const k of keys){const v=await sget(k);if(!v||!v.lat)continue;if(USER&&v.id===USER.id)continue;if(now-(v.ts||0)>600000)continue;if(memberMarkers[v.id])memberMarkers[v.id].setLatLng([v.lat,v.lng]);else memberMarkers[v.id]=L.marker([v.lat,v.lng],{icon:mkMember(v.em)}).addTo(map);memberMarkers[v.id].bindPopup(`<b style="font-family:Tajawal">${v.em} ${v.nm}</b>`);}}
function buildMapSection(){document.getElementById('s-map').innerHTML=`<h2>🗺️ ${LANG==='ar'?'خريطة طرابزون':'Harita'}</h2><p class="lead">${LANG==='ar'?'شكل جوجل · مولات ومطاعم وقهوة وجوامع · فلتر أسعار · موقع كل واحد بالشلّة.':'Google · fiyat filtresi · konumlar.'}</p><div class="statusbar"><span id="livedot" class="dot-live"></span><span id="livetext">${LANG==='ar'?'اضغط «أين نحن» و«شارك موقعي» ليشوفوكم الشلّة':'"Neredeyiz" + "Paylaş"'}</span></div><div class="maptools"><button class="mt live" onclick="locate()">📍 ${LANG==='ar'?'أين نحن؟':'Neredeyiz?'}</button><button class="mt" id="sharebtn" onclick="toggleShare()">👥 ${LANG==='ar'?'شارك موقعي':'Paylaş'}</button><button class="mt" onclick="recenter()">↺ ${LANG==='ar'?'المركز':'Merkez'}</button></div><div class="maptools"><button class="mt" onclick="filterMap('all')">${LANG==='ar'?'الكل':'Hepsi'}</button><button class="mt" onclick="filterMap('mall')">🛒</button><button class="mt" onclick="filterMap('food')">🍽️</button><button class="mt" onclick="filterMap('coffee')">☕</button><button class="mt" onclick="filterMap('gf')">🌾</button><button class="mt" onclick="filterMap('kids')">👧</button><button class="mt" onclick="filterMap('mosque')">🕌</button></div><div class="maptools"><button class="mt dah" onclick="filterMap('dah')">💎 DAAAAH</button><button class="mt mid" onclick="filterMap('mid')">🙂 ${LANG==='ar'?'متوسطة':'Orta'}</button><button class="mt kadih" onclick="filterMap('kadih')">💪 ${LANG==='ar'?'الكادحة':'Halk'}</button></div><div id="map"></div>`;}

/* confetti */
function confetti(small){const cv=document.getElementById('conf');cv.style.display='block';const ctx=cv.getContext('2d');cv.width=innerWidth;cv.height=innerHeight;const cols=['#e0a23a','#15808f','#b5402f','#2e8b57','#7b4fc0','#f3c46b'];const N=small?40:120;let parts=[];for(let i=0;i<N;i++)parts.push({x:Math.random()*cv.width,y:-20-Math.random()*cv.height*.3,r:4+Math.random()*6,c:cols[i%cols.length],vy:2+Math.random()*4,vx:-2+Math.random()*4,a:Math.random()*6});let t=0;(function fr(){ctx.clearRect(0,0,cv.width,cv.height);t++;parts.forEach(p=>{p.y+=p.vy;p.x+=p.vx;p.a+=.1;ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.a);ctx.fillStyle=p.c;ctx.fillRect(-p.r/2,-p.r/2,p.r,p.r*.6);ctx.restore();});if(t<110)requestAnimationFrame(fr);else cv.style.display='none';})();}
addEventListener('resize',()=>{const cv=document.getElementById('conf');cv.width=innerWidth;cv.height=innerHeight;});

/* init */
window.addEventListener('load',async()=>{applyLang();buildRoster();buildMapSection();injectPWA();fetchWeather();VISITED=(await sget('fambam:visited'))||{};POLL=(await sget('fambam:poll'))||null;VOTES=(await sget('fambam:votes'))||{};WNR=(await sget('fambam:wnr'))||null;WANS=(await sget('fambam:wans'))||{};
  if(SB){
    SB.channel('fb-loc').on('postgres_changes',{event:'*',schema:'public',table:'fb_locations',filter:'room=eq.'+ROOM},()=>{if(map)drawMembers();}).subscribe();
    SB.channel('fb-state').on('postgres_changes',{event:'*',schema:'public',table:'fb_state',filter:'room=eq.'+ROOM},async()=>{await refreshState();const a=document.querySelector('.tab.active');if(a&&a.dataset.t==='vote')renderVote();renderPresence();if(USER)updateMeter();}).subscribe();
  }
  let savedId=null;try{savedId=localStorage.getItem('fambam_uid');}catch(e){}
  if(savedId&&ROSTER.find(p=>p.id===savedId)){login(savedId,true);}
  if('serviceWorker' in navigator){try{await navigator.serviceWorker.register('sw.js');}catch(e){}}
});
setInterval(async()=>{if(!USER)return;const v=await sget('fambam:visited');if(v)VISITED=v;const pl=await sget('fambam:poll');POLL=pl||POLL;const vt=await sget('fambam:votes');if(vt)VOTES=vt;const wn=await sget('fambam:wnr');WNR=wn||WNR;const wa=await sget('fambam:wans');if(wa)WANS=wa;renderPresence();const a=document.querySelector('.tab.active');if(a){const t=a.dataset.t;if(t==='vote')renderVote();if(t==='map'&&map){drawMarkers(curFilter);if(SHARING)drawMembers();}updateMeter();}},15000);
</script>
